<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CapCut Pro | Shakil Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        
        body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; margin: 0; height: 100vh; }

        /* --- ১. সেই অরিজিনাল কসমিক এনিমেশন --- */
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .shakil-brand {
            font-family: 'Montserrat', sans-serif; font-size: 4rem; font-weight: 900; letter-spacing: 12px;
            background: linear-gradient(to right, #fff, #00f5ff, #bd00ff, #fff);
            background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: aurora 5s infinite linear;
        }
        @keyframes aurora { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        /* --- ২. প্রথম পেজ (LANDING PAGE like CapCut) --- */
        #landing-page {
            position: fixed; inset: 0; background: #000; z-index: 5000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .project-card {
            width: 90%; max-width: 400px; height: 200px; background: #1a1a1a;
            border-radius: 20px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 15px; cursor: pointer; transition: 0.3s;
        }
        .project-card:active { transform: scale(0.95); }
        .project-card i { font-size: 40px; color: #fff; }

        /* --- ৩. এডিটর পেজ (CapCut Mobile Layout) --- */
        #editor-ui { display: none; flex-direction: column; height: 100vh; }
        
        /* উপরের বার (Header) */
        header { height: 55px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; }
        .res-box { display: flex; items-center; gap: 5px; color: #fff; font-size: 12px; font-weight: bold; }
        .export-btn { background: #0080ff; color: #fff; padding: 6px 15px; border-radius: 4px; font-size: 12px; font-weight: 800; }

        /* প্রিভিউ এরিয়া */
        .preview-window { flex: 1; background: #050505; position: relative; display: flex; items-center; justify-content: center; }
        video { max-width: 100%; max-height: 100%; }

        /* টাইমলাইন (CapCut Style) */
        .timeline-area { height: 280px; background: #121212; position: relative; border-top: 1px solid #222; overflow: hidden; }
        .playhead-center { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #fff; z-index: 100; pointer-events: none; }
        .scroll-tracks { flex: 1; overflow-x: auto; padding: 40px 0; min-width: 10000px; }
        .track { height: 50px; background: rgba(255,255,255,0.02); margin-bottom: 10px; position: relative; }

        /* নিচের টুলবার (DUBBING অপশনসহ) */
        .bottom-nav { height: 70px; background: #000; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #1a1a1a; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #777; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 20px; }

        /* ডাবিং পপআপ */
        #dub-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <h1 class="shakil-brand">SHAKIL</h1>
    </div>

    <div id="landing-page">
        <div class="project-card" onclick="document.getElementById('file-upload').click()">
            <i class="fa-solid fa-plus"></i>
            <span class="font-bold text-lg">New Project</span>
        </div>
        <input type="file" id="file-upload" class="hidden" onchange="startEditor(this)">
    </div>

    <div id="editor-ui">
        <header>
            <i class="fa-solid fa-chevron-left" onclick="location.reload()"></i>
            <div class="res-box">
                <span>1080P</span>
                <i class="fa-solid fa-caret-down text-[10px]"></i>
            </div>
            <button class="export-btn">EXPORT</button>
        </header>

        <div class="preview-window">
            <video id="player" playsinline></video>
            <div class="absolute" onclick="togglePlay()"><i id="play-ico" class="fa-solid fa-play text-4xl opacity-50"></i></div>
        </div>

        <div class="timeline-area">
            <div class="playhead-center"></div>
            <div class="scroll-tracks" id="tl-scroll">
                <div class="track" id="v-track"></div>
                <div id="a-track" class="track"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active"><i class="fa-solid fa-scissors"></i><span>Edit</span></div>
            <div class="nav-item"><i class="fa-solid fa-music"></i><span>Audio</span></div>
            <div class="nav-item"><i class="fa-solid fa-font"></i><span>Text</span></div>
            <div class="nav-item" onclick="showDub()"><i class="fa-solid fa-microphone-lines"></i><span>Dubbing</span></div>
            <div class="nav-item"><i class="fa-solid fa-wand-magic-sparkles"></i><span>Effects</span></div>
        </div>
    </div>

    <div id="dub-popup">
        <div class="bg-[#1a1a1a] w-full max-w-sm p-8 rounded-3xl">
            <h3 class="text-xl font-bold mb-4">AI Dubbing</h3>
            <textarea id="dub-text" class="w-full bg-black p-4 rounded-xl border border-zinc-800 outline-none h-32 mb-4" placeholder="সংলাপ লিখুন..."></textarea>
            <div class="flex gap-4">
                <button onclick="hideDub()" class="flex-1 text-zinc-500">Cancel</button>
                <button onclick="runDub()" id="dub-btn" class="flex-1 bg-white text-black py-2 rounded-full font-bold">Generate</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('player');
        const pIco = document.getElementById('play-ico');

        // এনিমেশন লজিক
        window.onload = () => {
            const tl = gsap.timeline();
            tl.to("#intro-overlay", { duration: 1.5, opacity: 0, display: "none", delay: 2 })
              .set("#landing-page", { display: "flex" });
        };

        function startEditor(input) {
            if(!input.files[0]) return;
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('editor-ui').style.display = 'flex';
            video.src = URL.createObjectURL(input.files[0]);
            document.getElementById('v-track').innerHTML = `<div class="absolute h-10 bg-zinc-800 border border-zinc-600 rounded left-[50%] w-[1000px] px-4 flex items-center text-[10px]">${input.files[0].name}</div>`;
        }

        function togglePlay() {
            video.paused ? (video.play(), pIco.className='fa-solid fa-pause') : (video.pause(), pIco.className='fa-solid fa-play');
        }

        video.ontimeupdate = () => {
            document.getElementById('tl-scroll').scrollLeft = video.currentTime * 50;
        };

        function showDub() { document.getElementById('dub-popup').style.display = 'flex'; }
        function hideDub() { document.getElementById('dub-popup').style.display = 'none'; }

        async function runDub() {
            const btn = document.getElementById('dub-btn');
            btn.innerText = "Processing...";
            // আপনার API কল এখানে হবে
            setTimeout(() => {
                alert("ডাবিং সম্পন্ন হয়েছে!");
                btn.innerText = "Generate";
                hideDub();
            }, 2000);
        }
    </script>
</body>
</html>
