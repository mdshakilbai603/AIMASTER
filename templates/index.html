<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master Pro - Shakil's Edition with Lip-Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; }
        
        /* Intro Animation */
        #intro { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .shakil-glow { font-size: 5rem; font-weight: 900; background: linear-gradient(90deg, #00f5ff, #fff, #00f5ff); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s infinite linear; }
        @keyframes shine { to { background-position: 200% center; } }

        /* CapCut Style Glass UI */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; }
        .timeline { height: 260px; background: #080808; border-top: 1px solid #1a1a1a; overflow-x: auto; position: relative; }
        .track { height: 45px; background: rgba(255,255,255,0.02); margin: 10px 0; border-radius: 8px; position: relative; min-width: 5000px; }
        .clip { position: absolute; height: 35px; top: 5px; background: #00f5ff; color: #000; border-radius: 6px; padding: 0 10px; font-size: 11px; font-weight: bold; display: flex; align-items: center; cursor: pointer; }
        .audio-clip { background: #a855f7; color: #fff; }
        .playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #ff3e3e; z-index: 100; box-shadow: 0 0 10px #ff3e3e; }
        
        /* AI Loading Animation */
        .ai-loader { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px; }
        .ai-spinner { width: 50px; height: 50px; border: 5px solid #333; border-top-color: #00f5ff; border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="intro">
        <h2 class="animate__animated animate__fadeInDown text-zinc-500 tracking-[10px] text-xs uppercase mb-4">Masterpiece by</h2>
        <h1 class="shakil-glow animate__animated animate__zoomIn">SHAKIL</h1>
        <div class="mt-10 animate__animated animate__fadeInUp animate__delay-1s">
            <span class="text-cyan-400 font-bold tracking-[5px] text-sm uppercase">AI MASTER PRO</span>
        </div>
    </div>

    <div id="main-app" class="h-screen flex flex-col opacity-0">
        <nav class="h-16 glass m-2 px-6 flex items-center justify-between z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-xl"><i class="fa-solid fa-wand-sparkles text-black text-xl"></i></div>
                <h1 class="text-lg font-black tracking-tighter">AI MASTER <span class="text-cyan-400">PRO</span></h1>
            </div>
            <div class="flex gap-3">
                <button onclick="openDub()" class="bg-indigo-600 px-6 py-2 rounded-full text-xs font-bold hover:bg-indigo-500 transition">AUTO DUB & SYNC</button>
                <button class="bg-white text-black px-6 py-2 rounded-full text-xs font-black">EXPORT</button>
            </div>
        </nav>

        <div class="flex flex-1 overflow-hidden px-2">
            <aside class="w-72 glass p-5 flex flex-col m-1">
                <button onclick="document.getElementById('file-in').click()" class="w-full py-8 border-2 border-dashed border-zinc-800 rounded-2xl hover:border-cyan-500 group transition">
                    <i class="fa-solid fa-plus text-zinc-600 group-hover:text-cyan-400 mb-2 block"></i>
                    <span class="text-[10px] text-zinc-500 uppercase font-bold">Import Video</span>
                </button>
                <input type="file" id="file-in" class="hidden" multiple onchange="upload(this)">
                <div id="asset-list" class="mt-6 flex-1 overflow-y-auto space-y-3"></div>
            </aside>

            <main class="flex-1 flex flex-col m-1">
                <div class="flex-1 glass relative flex items-center justify-center overflow-hidden">
                    <video id="player" class="w-full h-full object-contain"></video>
                    
                    <div id="ai-loading-overlay" class="ai-loader">
                        <div class="ai-spinner mb-4"></div>
                        <p class="text-cyan-400 font-bold text-sm animate-pulse">● AI Lip-Syncing in Progress...</p>
                        <p class="text-zinc-500 text-xs mt-2">(Please wait 1-2 minutes)</p>
                    </div>
                </div>

                <div class="timeline mt-2 rounded-3xl p-6 relative">
                    <div class="flex justify-between items-center mb-4 sticky left-0 z-50">
                        <span id="timer" class="text-2xl font-black text-cyan-400">00:00:00</span>
                        <button onclick="toggle()" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center text-xl shadow-2xl"><i id="p-ico" class="fa-solid fa-play"></i></button>
                    </div>
                    <div class="relative pt-4">
                        <div id="playhead" class="playhead"></div>
                        <div id="v-track" class="track"></div>
                        <div id="a-track" class="track"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="dub-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-xl z-[100] flex items-center justify-center p-4">
        <div class="w-full max-w-lg glass p-10 animate__animated animate__fadeInUp">
            <h2 class="text-2xl font-black mb-1">Drama <span class="text-cyan-400">Sync Pro</span></h2>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[5px] mb-8">Professional Voice & Lip Replacement</p>

            <textarea id="dub-input" class="w-full bg-white/5 border border-white/10 p-5 rounded-3xl outline-none focus:border-cyan-500 transition h-32 text-sm mb-6" placeholder="নাটকের সংলাপ এখানে লিখুন (Lip-Sync হবে)..."></textarea>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <label class="cursor-pointer"><input type="radio" name="v" value="male" class="hidden peer">
                    <div class="p-4 rounded-2xl bg-white/5 border border-white/5 peer-checked:bg-cyan-500 peer-checked:text-black text-center transition">
                        <i class="fa-solid fa-person text-xl mb-1"></i><span class="text-[10px] font-bold block uppercase">Actor</span>
                    </div>
                </label>
                <label class="cursor-pointer"><input type="radio" name="v" value="female" checked class="hidden peer">
                    <div class="p-4 rounded-2xl bg-white/5 border border-white/5 peer-checked:bg-pink-500 peer-checked:text-black text-center transition">
                        <i class="fa-solid fa-person-dress text-xl mb-1"></i><span class="text-[10px] font-bold block uppercase">Actress</span>
                    </div>
                </label>
            </div>

            <div class="flex gap-4">
                <button onclick="closeDub()" class="flex-1 py-4 text-xs font-bold text-zinc-500">CANCEL</button>
                <button id="dub-btn" onclick="runDubSync()" class="flex-[2] py-4 bg-white text-black rounded-2xl text-xs font-black hover:bg-cyan-400 transition">GENERATE & SYNC</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('player');
        const playhead = document.getElementById('playhead');
        let currentVideoFilename = ''; // বর্তমান ভিডিও ফাইলের নাম সেভ রাখার জন্য

        // Intro Logic
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('intro').classList.add('animate__animated', 'animate__fadeOut');
                setTimeout(() => {
                    document.getElementById('intro').style.display = 'none';
                    document.getElementById('main-app').classList.remove('opacity-0');
                    document.getElementById('main-app').classList.add('animate__animated', 'animate__fadeIn');
                }, 1000);
            }, 3000);
        };

        async function upload(input) {
            const fd = new FormData();
            for(let f of input.files) fd.append('files', f);
            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            
            data.files.forEach(f => {
                document.getElementById('asset-list').innerHTML += `
                    <div onclick="playVid('${f.url}', '${f.name}', '${f.unique_name}')" class="glass p-3 hover:border-cyan-500 transition cursor-pointer group">
                        <div class="h-24 bg-black rounded-xl mb-2 flex items-center justify-center"><i class="fa-solid fa-film text-zinc-800 text-2xl"></i></div>
                        <p class="text-[9px] truncate font-bold text-zinc-500">${f.name}</p>
                    </div>`;
            });
        }

        function playVid(url, name, uniqueName) {
            video.src = url;
            currentVideoFilename = uniqueName; // Lip-Sync-এর জন্য ফাইলের নাম সেভ রাখা হলো
            document.getElementById('v-track').innerHTML = `<div class="clip w-[1500px]">${name}</div>`;
            video.play();
        }

        function toggle() {
            if (video.paused) { video.play(); document.getElementById('p-ico').className = 'fa-solid fa-pause'; }
            else { video.pause(); document.getElementById('p-ico').className = 'fa-solid fa-play'; }
        }

        function openDub() { 
            if(!currentVideoFilename) return alert("দয়া করে আগে একটি ভিডিও আপলোড ও প্লে করুন।");
            document.getElementById('dub-modal').classList.remove('hidden'); 
        }
        function closeDub() { document.getElementById('dub-modal').classList.add('hidden'); }

        // Lip-Sync-সহ ডাবিং রান করা
        async function runDubSync() {
            const text = document.getElementById('dub-input').value;
            const gender = document.querySelector('input[name="v"]:checked').value;
            const btn = document.getElementById('dub-btn');
            const aiOverlay = document.getElementById('ai-loading-overlay');
            
            if(!text) return;
            btn.innerText = "DUBBING...";
            closeDub(); // মোডাল বন্ধ
            aiOverlay.style.display = 'flex'; // AI Loader চালু

            try {
                const res = await fetch('/api/generate-dub-sync', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text, gender, video_filename: currentVideoFilename })
                });
                const data = await res.json();

                if(data.status === 'processing') {
                    // HeyGen টাস্ক আইডি পাওয়া গেছে। এখন আমরা কিছুক্ষণ পর পর স্ট্যাটাস চেক করবো।
                    checkHeyGenStatus(data.task_id);
                    // ব্যাকআপ হিসেবে টাইমলাইনে অডিও সিঙ্ক করে রাখা হলো
                    const pos = video.currentTime;
                    document.getElementById('a-track').innerHTML += `<div class="clip audio-clip w-60" style="left:${pos * 40}px">Syncing ${gender}...</div>`;
                } else if (data.status === 'fallback_audio_only') {
                    // লিপ-সিঙ্ক ফেল করলে শুধু অডিও সিঙ্ক হবে
                    new Audio(data.audio_url).play();
                    aiOverlay.style.display = 'none';
                    alert("Lip-Sync ফেল হয়েছে, শুধু অডিও সিঙ্ক হচ্ছে।");
                }
            } catch(e) {
                aiOverlay.style.display = 'none';
                alert("এরর: ডাবিং করা যায়নি।");
            }
            btn.innerText = "GENERATE & SYNC";
        }

        // HeyGen টাস্ক স্ট্যাটাস চেক করা (Recursive function)
        async function checkHeyGenStatus(taskId) {
            const aiOverlay = document.getElementById('ai-loading-overlay');
            
            try {
                const res = await fetch(`/api/check-sync-status/${taskId}`);
                const data = await res.json();

                if(data.status === 'completed') {
                    // লিপ-সিঙ্ক সম্পন্ন হয়েছে। নতুন ভিডিও প্লেয়ারে লোড করা হলো।
                    aiOverlay.style.display = 'none';
                    video.src = data.video_url;
                    video.play();
                    alert("লিপ-সিঙ্ক সফলভাবে সম্পন্ন হয়েছে!");
                } else if (data.status === 'failed') {
                    aiOverlay.style.display = 'none';
                    alert(`লিপ-সিঙ্ক ফেল হয়েছে: ${data.error}`);
                } else {
                    // এখনও প্রসেসিং হচ্ছে। ২ সেকেন্ড পর আবার চেক করবো।
                    setTimeout(() => checkHeyGenStatus(taskId), 2000);
                }
            } catch(e) {
                aiOverlay.style.display = 'none';
                alert("লিপ-সিঙ্ক স্ট্যাটাস চেক করতে সমস্যা হয়েছে।");
            }
        }

        video.ontimeupdate = () => {
            const t = video.currentTime;
            document.getElementById('timer').innerText = t.toFixed(2) + "s";
            playhead.style.left = (t * 40) + "px";
        };
    </script>
</body>
</html>
