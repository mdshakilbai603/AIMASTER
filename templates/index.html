<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Master Pro | Full Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@400;700&display=swap');
        
        html, body { margin: 0; padding: 0; height: 100dvh; background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; user-select: none; }
        
        /* --- ইন্ট্রো --- */
        #intro { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .shakil-text { font-family: 'Montserrat', sans-serif; font-size: 4rem; font-weight: 900; background: linear-gradient(90deg, #fff, #00f5ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 30px rgba(0,245,255,0.5); }
        
        /* --- মেইন লেআউট --- */
        .editor-container { display: grid; grid-template-rows: auto 1fr auto; height: 100dvh; }
        .preview-area { background: #0a0a0a; display: flex; align-items: center; justify-content: center; position: relative; }
        video { max-width: 100%; max-height: 100%; box-shadow: 0 0 50px rgba(0,0,0,0.8); border-radius: 10px; }
        
        /* --- টুলস প্যানেল --- */
        .controls { background: #111; padding: 15px; border-top: 1px solid #222; }
        .tool-btn { background: #1a1a1a; padding: 12px; border-radius: 15px; border: 1px solid #333; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 80px; }
        .tool-btn:hover { background: #00f5ff; color: #000; transform: translateY(-3px); }
        .tool-btn i { font-size: 1.2rem; }
        .tool-btn span { font-size: 10px; font-weight: bold; }

        /* --- লোডার এনিমেশন --- */
        .processing-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
        .loader-circle { width: 50px; height: 50px; border: 4px solid #1a1a1a; border-top: 4px solid #00f5ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* মডাল স্টাইল */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="shakil-text">SHAKIL</div>
        <div class="text-cyan-400 font-bold tracking-[5px] text-xs">AI MASTER PRO</div>
    </div>

    <div class="editor-container">
        <div class="p-4 flex justify-between items-center bg-black border-b border-[#222]">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-bolt text-yellow-400"></i>
                <span class="font-bold text-sm tracking-tighter text-gray-300">SHAKIL ENGINE V3.0</span>
            </div>
            <button onclick="openExport()" class="bg-white text-black px-6 py-1.5 rounded-full font-black text-xs hover:bg-cyan-400 transition">SAVE VIDEO</button>
        </div>

        <div class="preview-area">
            <video id="main-video" controls style="display:none;"></video>
            <div id="add-text" onclick="document.getElementById('video-input').click()" class="flex flex-col items-center gap-3 cursor-pointer">
                <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center border border-dashed border-white/20">
                    <i class="fa-solid fa-plus text-2xl"></i>
                </div>
                <p class="text-gray-500 font-bold text-xs uppercase tracking-widest">নতুন প্রোজেক্ট শুরু করুন</p>
            </div>
            <input type="file" id="video-input" class="hidden" accept="video/*" onchange="loadVideo(this)">
            
            <div id="processing-ui" class="processing-overlay">
                <div class="loader-circle"></div>
                <p class="text-cyan-400 font-bold text-xs mt-4 tracking-widest">AI IS EDITING...</p>
            </div>
        </div>

        <div class="controls">
            <div class="flex gap-3 overflow-x-auto pb-2">
                <div class="tool-btn" onclick="document.getElementById('video-input').click()">
                    <i class="fa-solid fa-film"></i><span>মিডিয়া</span>
                </div>
                <div class="tool-btn" id="dub-btn" onclick="openDubbing()">
                    <i class="fa-solid fa-microphone-lines text-cyan-400"></i><span>ডাবিং</span>
                </div>
                <div class="tool-btn">
                    <i class="fa-solid fa-wand-magic-sparkles"></i><span>ইফেক্ট</span>
                </div>
                <div class="tool-btn">
                    <i class="fa-solid fa-closed-captioning"></i><span>সাবটাইটেল</span>
                </div>
            </div>
        </div>
    </div>

    <div id="dub-modal" class="modal">
        <div class="bg-[#111] p-8 rounded-3xl w-80 border border-cyan-900/30 text-center">
            <i class="fa-solid fa-robot text-4xl text-cyan-400 mb-4"></i>
            <h3 class="font-bold mb-4">AI ডাবিং সেটআপ</h3>
            <select id="lang" class="w-full bg-[#1a1a1a] p-3 rounded-xl border border-gray-800 text-sm mb-4">
                <option value="bn">বাংলা (Bengali)</option>
                <option value="en">English</option>
                <option value="hi">Hindi</option>
            </select>
            <button onclick="processDubbing()" class="w-full bg-cyan-500 text-black font-bold py-3 rounded-xl">GENERATE</button>
            <p onclick="closeDubbing()" class="mt-4 text-xs text-gray-500 cursor-pointer">ফিরে যান</p>
        </div>
    </div>

    <script>
        // ইন্ট্রো হ্যান্ডলার
        setTimeout(() => {
            const intro = document.getElementById('intro');
            intro.style.opacity = '0';
            setTimeout(() => intro.remove(), 500);
        }, 2000);

        const video = document.getElementById('main-video');
        const loader = document.getElementById('processing-ui');
        const placeholder = document.getElementById('add-text');

        // --- ভিডিও আপলোড এবং সার্ভার কল (Real API Connection) ---
        async function loadVideo(input) {
            const file = input.files[0];
            if (!file) return;

            // UI পরিবর্তন
            loader.style.display = 'flex';
            placeholder.style.display = 'none';

            const formData = new FormData();
            formData.append("file", file);

            try {
                // আপনার app.py সার্ভারের এপিআই-তে রিকোয়েস্ট
                const response = await fetch('/api/process', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if(data.status === 'success') {
                    video.src = data.url;
                    video.style.display = 'block';
                    video.play();
                } else {
                    alert("ভুল হয়েছে: " + data.error);
                    placeholder.style.display = 'flex';
                }
            } catch (err) {
                alert("সার্ভার কানেক্ট করা যায়নি! app.py চেক করুন।");
                placeholder.style.display = 'flex';
            } finally {
                loader.style.display = 'none';
            }
        }

        // ডাবিং ফাংশনালিটি
        function openDubbing() {
            if(!video.src) return alert("আগে ভিডিও যোগ করুন!");
            document.getElementById('dub-modal').style.display = 'flex';
        }

        function closeDubbing() {
            document.getElementById('dub-modal').style.display = 'none';
        }

        async function processDubbing() {
            const btn = document.getElementById('dub-btn');
            closeDubbing();
            loader.style.display = 'flex';
            
            // ভবিষ্যতে এখানে ডাবিং এপিআই কল হবে
            setTimeout(() => {
                loader.style.display = 'none';
                alert("AI ভয়েস প্রসেসিং শুরু হয়েছে! সার্ভার চেক করুন।");
            }, 2500);
        }

        function openExport() {
            if(!video.src) return alert("সেভ করার জন্য কোনো ভিডিও নেই!");
            window.open(video.src, '_blank');
        }
    </script>
</body>
</html>
