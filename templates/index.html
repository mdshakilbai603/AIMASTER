<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master | Shakil</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;900&family=Poppins:wght@700;900&display=swap');
        
        :root {
            --aurora-1: #00f5ff;
            --aurora-2: #bd00ff;
        }

        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; height: 100vh; }

        /* --- সেই প্রথম GSAP Cosmic Ring Animation --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #050505 0%, #000 100%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .cosmic-ring {
            position: absolute;
            width: 350px; height: 350px;
            border-radius: 50%;
            border: 2px solid var(--aurora-1);
            opacity: 0;
            transform: scale(0) rotateX(75deg);
        }

        .shakil-title {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            background: linear-gradient(to right, #fff, var(--aurora-1), var(--aurora-2), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            z-index: 10;
            margin-bottom: 10px;
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* নামের নিচে ওয়েবসাইটের নাম */
        .site-subtitle {
            font-size: 12px;
            letter-spacing: 12px;
            color: #555;
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0;
            transform: translateY(20px);
        }

        /* --- UI ডিজাইন (ছবির মতো) --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
        }

        .neon-btn {
            background: linear-gradient(135deg, var(--aurora-1), var(--aurora-2));
            color: #000; font-weight: 900;
            padding: 10px 25px; border-radius: 50px;
            text-transform: uppercase; font-size: 11px;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
        }
        
        .timeline-box { background: #050505; border-top: 1px solid #111; border-radius: 40px 40px 0 0; }
        .playhead { position: absolute; top: 0; bottom: 0; width: 3px; background: var(--aurora-1); box-shadow: 0 0 15px var(--aurora-1); z-index: 50; }
        .track { height: 45px; background: rgba(255,255,255,0.01); margin: 10px 0; border-radius: 12px; position: relative; min-width: 5000px; }
    </style>
</head>
<body class="flex flex-col">

    <div id="intro-overlay">
        <div class="cosmic-ring" id="ring-1"></div>
        <div class="cosmic-ring" id="ring-2" style="border-color: var(--aurora-2);"></div>
        <h1 class="shakil-title" id="main-name">SHAKIL</h1>
        <p class="site-subtitle" id="sub-name">AI MASTER</p>
    </div>

    <div id="app" class="flex-1 flex flex-col opacity-0">
        <header class="h-16 px-8 flex items-center justify-between border-b border-white/5 bg-black/60 backdrop-blur-md">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center text-black font-black">AI</div>
                <h1 class="font-black text-xl tracking-tighter uppercase">AI Master</h1>
            </div>
            <div class="flex gap-6 items-center">
                <button onclick="openDub()" class="text-[10px] font-bold text-zinc-500 hover:text-white transition tracking-widest uppercase">Auto Dubbing</button>
                <button class="neon-btn">Export Video</button>
            </div>
        </header>

        <main class="flex-1 flex overflow-hidden p-2">
            <aside class="w-72 glass-panel m-1 p-6 flex flex-col gap-4">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Media Library</span>
                    <button onclick="document.getElementById('f-in').click()" class="text-cyan-400"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div id="media-list" class="flex-1 overflow-y-auto space-y-3"></div>
                <input type="file" id="f-in" class="hidden" multiple onchange="handleUpload(this)">
            </aside>

            <section class="flex-1 flex flex-col m-1">
                <div class="flex-1 glass-panel relative flex items-center justify-center bg-black/40 overflow-hidden">
                    <video id="v-player" class="max-w-full max-h-full rounded-xl shadow-2xl"></video>
                    <div class="absolute bottom-10 flex gap-8 bg-black/80 px-10 py-5 rounded-full border border-white/10">
                        <button onclick="toggle()" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center text-xl shadow-xl"><i id="p-ico" class="fa-solid fa-play"></i></button>
                    </div>
                </div>

                <div class="timeline-box mt-2 p-8 overflow-hidden">
                    <div class="flex justify-between items-center mb-6">
                        <span id="timer" class="text-3xl font-black font-mono text-white/90">00:00:00</span>
                        <div class="flex gap-2 items-center">
                            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                            <span class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Dubbing Track Active</span>
                        </div>
                    </div>
                    <div class="relative overflow-x-auto h-24" id="timeline-scroll">
                        <div id="playhead" class="playhead"></div>
                        <div id="v-track" class="track"></div>
                        <div id="a-track" class="track"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="dub-modal" class="hidden fixed inset-0 bg-black/95 z-[1000] flex items-center justify-center backdrop-blur-3xl">
        <div class="w-full max-w-md glass-panel p-10">
            <h2 class="text-2xl font-black mb-6 uppercase tracking-tighter text-cyan-400">AI Drama Voice</h2>
            <textarea id="dub-txt" class="w-full bg-zinc-950 border border-white/10 p-5 rounded-2xl outline-none focus:border-cyan-500 text-sm mb-6 h-32" placeholder="নাটকের সংলাপ এখানে লিখুন..."></textarea>
            <div class="flex gap-4">
                <button onclick="closeDub()" class="flex-1 text-zinc-600 font-bold uppercase text-xs">Cancel</button>
                <button onclick="runDub()" class="flex-[2] neon-btn">Sync Voice</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('v-player');
        const playIco = document.getElementById('p-ico');

        // --- সেই সঠিক GSAP Cosmic Animation ---
        window.addEventListener('load', () => {
            const tl = gsap.timeline();
            tl.to("#ring-1", { duration: 1.5, opacity: 0.5, scale: 2.5, ease: "power4.out" })
              .to("#ring-2", { duration: 1.5, opacity: 0.3, scale: 3.2, ease: "power4.out" }, "-=1")
              .to("#main-name", { duration: 1.5, opacity: 1, scale: 1, ease: "back.out(1.7)" }, "-=1")
              .to("#sub-name", { duration: 1, opacity: 1, y: 0, ease: "power2.out" }, "-=0.5")
              .to("#intro-overlay", { duration: 1.2, y: "-100%", ease: "expo.inOut", delay: 1 })
              .to("#app", { duration: 1, opacity: 1, ease: "power4.out" }, "-=0.8");
        });

        function toggle() {
            if (video.paused) { video.play(); playIco.className = 'fa-solid fa-pause'; }
            else { video.pause(); playIco.className = 'fa-solid fa-play'; }
        }

        async function handleUpload(input) {
            const fd = new FormData();
            for(let f of input.files) fd.append('files', f);
            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            if(data.uploaded.length > 0) {
                video.src = `/uploads/${data.uploaded[0]}`;
                document.getElementById('v-track').innerHTML = `<div class="absolute h-full bg-cyan-500/20 border-l-2 border-cyan-400 px-4 flex items-center text-[10px] font-bold">${data.uploaded[0]}</div>`;
                video.play(); playIco.className = 'fa-solid fa-pause';
            }
        }

        function openDub() { document.getElementById('dub-modal').classList.remove('hidden'); }
        function closeDub() { document.getElementById('dub-modal').classList.add('hidden'); }

        async function runDub() {
            const text = document.getElementById('dub-txt').value;
            const res = await fetch('/api/generate-dub', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text })
            });
            const data = await res.json();
            if(data.status === 'success') {
                new Audio(data.audio_url).play();
                document.getElementById('a-track').innerHTML += `<div class="absolute h-[30px] top-[7px] bg-purple-500/40 border-l-2 border-purple-400 px-3 flex items-center text-[9px] rounded" style="left:${video.currentTime * 40}px">Voice Sync</div>`;
                closeDub();
            }
        }

        video.ontimeupdate = () => {
            const t = video.currentTime;
            document.getElementById('timer').innerText = t.toFixed(2).padStart(5, '0');
            document.getElementById('playhead').style.left = (t * 40) + "px";
        };
    </script>
</body>
</html>
