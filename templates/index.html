<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Master Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@400;700&display=swap');
        
        /* মোবাইলের স্ক্রিন ফিট করার জন্য height: 100dvh ব্যবহার করা হয়েছে */
        html, body { margin: 0; padding: 0; height: 100dvh; background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        
        /* --- ১. ইন্ট্রো এনিমেশন --- */
        #intro { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .shakil-text { font-family: 'Montserrat', sans-serif; font-size: 4.5rem; font-weight: 900; background: linear-gradient(90deg, #fff, #00f5ff, #bd00ff, #fff); background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradient 3s infinite; }
        @keyframes gradient { 0% { background-position: 0%; } 50% { background-position: 100%; } 100% { background-position: 0%; } }
        
        /* --- ২. মেইন অ্যাপ --- */
        #app { display: none; flex-direction: column; height: 100%; width: 100%; }
        
        /* হেডার */
        .top-bar { height: 55px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; flex-shrink: 0; background: #000; }
        .res-btn { background: #111; padding: 5px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid #333; cursor: pointer; }
        .export-btn { background: #007aff; color: white; padding: 6px 16px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }
        
        /* ড্রপডাউন মেনু */
        #res-modal { display: none; position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: #1a1a1a; padding: 15px; border-radius: 8px; z-index: 5000; width: 220px; border: 1px solid #333; }
        
        /* ভিডিও এরিয়া */
        .workspace { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background: #000; overflow: hidden; cursor: pointer; }
        video { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* টাইমলাইন */
        .timeline-area { height: 260px; background: #111; display: flex; flex-direction: column; flex-shrink: 0; border-top: 1px solid #222; }
        .timeline-tools { height: 40px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #222; }
        .tracks { flex: 1; position: relative; overflow-x: auto; overflow-y: hidden; padding-top: 20px; }
        .playhead { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: white; z-index: 10; box-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .video-track { height: 45px; background: rgba(255,255,255,0.05); margin-top: 10px; border-radius: 4px; min-width: 200%; border: 1px solid rgba(255,255,255,0.1); }
        
        /* বটম টুলবার (স্লাইড করা যাবে) */
        .bottom-toolbar { height: 75px; display: flex; overflow-x: auto; align-items: center; padding: 0 15px; gap: 25px; flex-shrink: 0; background: #000; border-top: 1px solid #1a1a1a; }
        .bottom-toolbar::-webkit-scrollbar { display: none; }
        .tool-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 10px; min-width: 45px; cursor: pointer; }
        .tool-btn i { font-size: 18px; margin-bottom: 6px; }
        .tool-btn.active { color: #fff; }
    </style>
</head>
<body>
    
    <div id="intro">
        <h1 class="shakil-text">SHAKIL</h1>
        <p style="color: #00f5ff; font-size: 11px; font-weight: bold; letter-spacing: 6px; margin-top: 15px;">AI MASTER PRO</p>
    </div>

    <div id="app">
        <div class="top-bar">
            <i class="fa-solid fa-chevron-left text-lg"></i>
            <div class="res-btn" onclick="toggleRes()">1080P <i class="fa-solid fa-caret-down text-[10px] ml-1"></i></div>
            <div class="export-btn" onclick="alert('Exporting Video...')">Export</div>
        </div>
        
        <div id="res-modal">
            <p class="text-[10px] text-gray-500 mb-3 font-bold uppercase tracking-widest">Resolution</p>
            <div class="flex justify-between mb-2">
                <span class="text-xs bg-zinc-800 px-2 py-1 rounded">720P</span>
                <span class="text-xs bg-blue-600 px-2 py-1 rounded font-bold">1080P</span>
                <span class="text-xs bg-zinc-800 px-2 py-1 rounded">2K/4K</span>
            </div>
        </div>

        <div class="workspace" onclick="document.getElementById('file-upload').click()">
            <input type="file" id="file-upload" class="hidden" accept="video/*" onchange="loadVideo(this)">
            <video id="main-video" playsinline></video>
            <i id="play-btn" class="fa-solid fa-play text-4xl absolute opacity-40" style="display:none;"></i>
            <div id="add-text" class="text-zinc-500 text-xs font-bold border border-zinc-700 px-4 py-2 rounded-full absolute"><i class="fa-solid fa-plus mr-2"></i>Tap to add video</div>
        </div>

        <div class="timeline-area">
            <div class="timeline-tools">
                <span class="text-[11px] text-gray-400 font-bold" id="time-display">00:00</span>
                <div class="flex gap-5">
                    <i class="fa-solid fa-rotate-left text-gray-500 text-sm"></i>
                    <i class="fa-solid fa-rotate-right text-gray-500 text-sm"></i>
                </div>
            </div>
            <div class="tracks" id="track-container">
                <div class="playhead"></div>
                <div class="video-track" id="v-clip" style="display:none;"></div>
            </div>
        </div>

        <div class="bottom-toolbar">
            <div class="tool-btn active"><i class="fa-solid fa-scissors"></i>Edit</div>
            <div class="tool-btn"><i class="fa-solid fa-microphone-lines text-cyan-400"></i>Dubbing</div>
            <div class="tool-btn"><i class="fa-solid fa-music"></i>Audio</div>
            <div class="tool-btn"><i class="fa-solid fa-font"></i>Text</div>
            <div class="tool-btn"><i class="fa-solid fa-layer-group"></i>Overlay</div>
            <div class="tool-btn"><i class="fa-solid fa-wand-magic-sparkles"></i>Effects</div>
            <div class="tool-btn"><i class="fa-solid fa-square-poll-vertical"></i>Ratio</div>
            <div class="tool-btn"><i class="fa-solid fa-filter"></i>Filters</div>
            <div class="tool-btn"><i class="fa-solid fa-sliders"></i>Adjust</div>
            <div class="tool-btn"><i class="fa-solid fa-palette"></i>Canvas</div>
        </div>
    </div>

    <script>
        // ২ সেকেন্ড পর ইন্ট্রো সরিয়ে মেইন অ্যাপ দেখাবে
        setTimeout(() => {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            }, 500);
        }, 2000);

        // 1080P ড্রপডাউন মেনু টগল করা
        function toggleRes() {
            const modal = document.getElementById('res-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }

        const video = document.getElementById('main-video');
        const playBtn = document.getElementById('play-btn');
        const vClip = document.getElementById('v-clip');

        // ভিডিও লোড এবং প্লে/পজ লজিক
        function loadVideo(input) {
            if(input.files && input.files[0]) {
                const url = URL.createObjectURL(input.files[0]);
                video.src = url;
                document.getElementById('add-text').style.display = 'none';
                playBtn.style.display = 'block';
                vClip.style.display = 'block';
                
                const togglePlay = (e) => {
                    e.stopPropagation();
                    if(video.paused) { 
                        video.play(); 
                        playBtn.classList.replace('fa-play', 'fa-pause'); 
                        playBtn.style.opacity = '0'; 
                    } else { 
                        video.pause(); 
                        playBtn.classList.replace('fa-pause', 'fa-play'); 
                        playBtn.style.opacity = '0.5'; 
                    }
                };

                playBtn.onclick = togglePlay;
                video.onclick = togglePlay;
            }
        }

        // টাইমলাইন আপডেট
        video.ontimeupdate = () => {
            const mins = Math.floor(video.currentTime / 60);
            const secs = Math.floor(video.currentTime % 60);
            document.getElementById('time-display').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            document.getElementById('track-container').scrollLeft = video.currentTime * 20;
        };
    </script>
</body>
</html>
