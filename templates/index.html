<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master Pro - Shakil Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .neon-border { border: 1px solid rgba(0, 245, 255, 0.3); }
        /* ফিল্টার ইফেক্টস */
        .filter-vhs { filter: sepia(0.5) contrast(1.2) saturate(1.5); }
        .filter-grayscale { filter: grayscale(1); }
        .filter-glitch { filter: hue-rotate(90deg) saturate(2); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="h-14 border-b border-zinc-800 flex items-center justify-between px-6 bg-zinc-900">
        <div class="flex items-center gap-2">
            <div class="bg-cyan-500 p-1 rounded-lg text-black font-bold">AI</div>
            <span class="text-xl font-bold tracking-tighter">AI MASTER</span>
        </div>
        <div class="flex gap-4">
            <button onclick="openDubbingModal()" class="bg-purple-600 px-4 py-1.5 rounded-full text-sm font-medium hover:bg-purple-500 transition">
                <i class="fa-solid fa-microphone"></i> AI Dubbing
            </button>
            <button class="bg-white text-black px-4 py-1.5 rounded-full text-sm font-bold">Export</button>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <div class="w-64 border-r border-zinc-800 bg-zinc-950 p-4 overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-sm font-semibold">Assets</h3>
                <button onclick="importMedia()" class="text-cyan-400 text-xs"><i class="fa-solid fa-plus"></i> Import</button>
            </div>
            <div id="assets-grid" class="space-y-3"></div>
        </div>

        <div class="flex-1 flex flex-col bg-black relative">
            <div class="flex-1 flex items-center justify-center p-10">
                <div class="relative w-full max-w-4xl aspect-video bg-zinc-900 rounded-xl overflow-hidden shadow-2xl neon-border">
                    <video id="main-video" class="w-full h-full object-contain" src=""></video>
                </div>
            </div>
            
            <div class="h-40 bg-zinc-900 border-t border-zinc-800 p-4">
                <div class="flex gap-2 mb-2 text-xs text-zinc-400">
                    <span id="current-time">00:00</span> / <span id="total-time">00:00</span>
                </div>
                <input type="range" id="seek-bar" class="w-full h-1 bg-zinc-800 accent-cyan-400 rounded-lg appearance-none cursor-pointer" value="0">
                <div class="mt-4 flex justify-center gap-6 text-2xl">
                    <button onclick="togglePlay()"><i id="play-btn" class="fa-solid fa-play text-white"></i></button>
                </div>
            </div>
        </div>

        <div class="w-72 border-l border-zinc-800 bg-zinc-950 p-4">
            <h3 class="text-sm font-semibold mb-4">Filters</h3>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="applyFilter('')" class="glass p-3 rounded-lg text-xs">Normal</button>
                <button onclick="applyFilter('filter-grayscale')" class="glass p-3 rounded-lg text-xs">B&W</button>
                <button onclick="applyFilter('filter-vhs')" class="glass p-3 rounded-lg text-xs">VHS</button>
                <button onclick="applyFilter('filter-glitch')" class="glass p-3 rounded-lg text-xs">Glitch</button>
            </div>
        </div>
    </div>

    <div id="dub-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-zinc-900 p-6 rounded-2xl w-96 border border-zinc-800">
            <h2 class="text-lg font-bold mb-4">AI Dubbing (Bengali)</h2>
            <textarea id="dub-text" class="w-full bg-zinc-800 p-3 rounded-lg text-sm h-32 outline-none" placeholder="আপনার বাংলা টেক্সট লিখুন..."></textarea>
            <div class="mt-4 flex gap-2">
                <button onclick="closeDubbingModal()" class="flex-1 py-2 bg-zinc-800 rounded-lg">Cancel</button>
                <button id="gen-btn" onclick="generateDubbing()" class="flex-1 py-2 bg-cyan-600 rounded-lg font-bold">Generate</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('main-video');
        const playBtn = document.getElementById('play-btn');

        async function loadAssets() {
            const res = await fetch('/api/assets');
            const data = await res.json();
            const grid = document.getElementById('assets-grid');
            grid.innerHTML = '';
            data.forEach(asset => {
                grid.innerHTML += `
                    <div onclick="setVideo('${asset.url}')" class="bg-zinc-900 p-2 rounded-lg cursor-pointer hover:bg-zinc-800 border border-transparent hover:border-cyan-500 transition">
                        <p class="text-[10px] truncate">${asset.name}</p>
                    </div>`;
            });
        }

        function setVideo(url) {
            video.src = url;
            video.play();
            playBtn.classList.replace('fa-play', 'fa-pause');
        }

        function togglePlay() {
            if (video.paused) {
                video.play();
                playBtn.classList.replace('fa-play', 'fa-pause');
            } else {
                video.pause();
                playBtn.classList.replace('fa-pause', 'fa-play');
            }
        }

        function applyFilter(filterClass) {
            video.className = "w-full h-full object-contain " + filterClass;
        }

        function openDubbingModal() { document.getElementById('dub-modal').classList.remove('hidden'); }
        function closeDubbingModal() { document.getElementById('dub-modal').classList.add('hidden'); }

        async function generateDubbing() {
            const text = document.getElementById('dub-text').value;
            const btn = document.getElementById('gen-btn');
            if(!text) return;
            
            btn.innerText = "Processing...";
            const res = await fetch('/api/generate-dub', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text })
            });
            const data = await res.json();
            if(data.status === 'success') {
                const audio = new Audio(data.audio_url);
                audio.play();
                alert("ভয়েস তৈরি হয়েছে!");
            }
            btn.innerText = "Generate";
            closeDubbingModal();
        }

        function importMedia() {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = async (e) => {
                const fd = new FormData();
                fd.append('files', e.target.files[0]);
                await fetch('/upload', {method: 'POST', body: fd});
                loadAssets();
            };
            input.click();
        }

        video.ontimeupdate = () => {
            document.getElementById('seek-bar').value = (video.currentTime / video.duration) * 100 || 0;
            document.getElementById('current-time').innerText = Math.floor(video.currentTime) + "s";
        };

        window.onload = loadAssets;
    </script>
</body>
</html>
