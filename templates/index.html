<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CapCut Pro | Shakil Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
        }

        /* --- Intro Animation (আপনার পছন্দের সেই স্টাইল) --- */
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .shakil-brand {
            font-size: 3rem; font-weight: 900; letter-spacing: 10px; text-transform: uppercase;
            background: linear-gradient(to right, #fff, #00f5ff, #bd00ff, #fff);
            background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: aurora 5s infinite linear;
        }
        @keyframes aurora { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        /* --- CAPCUT MOBILE UI STYLE --- */
        .app-container { display: flex; flex-direction: column; height: 100vh; opacity: 0; }
        
        /* Top Header */
        header { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; border-bottom: 1px solid #1a1a1a; }
        
        /* Video Preview Area (CapCut Style) */
        .preview-window { 
            flex: 1; background: #000; display: flex; align-items: center; justify-content: center; 
            position: relative; overflow: hidden;
        }
        video { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Middle Toolbar */
        .toolbar { height: 60px; display: flex; align-items: center; justify-content: space-around; background: #0f0f0f; font-size: 20px; color: #aaa; }

        /* Timeline Area (The Real CapCut Experience) */
        .timeline-container { 
            height: 280px; background: #121212; border-top: 1px solid #222; position: relative;
            display: flex; flex-direction: column;
        }
        
        .timeline-controls { height: 40px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; font-size: 12px; color: #777; border-bottom: 1px solid #1a1a1a; }

        .timeline-scroll { flex: 1; overflow-x: auto; position: relative; padding: 20px 0; scroll-behavior: smooth; }
        
        /* Playhead (Fixed Center Like CapCut) */
        .playhead-center { 
            position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; 
            background: #fff; z-index: 100; pointer-events: none;
        }

        .track-row { height: 50px; background: rgba(255,255,255,0.03); margin-bottom: 10px; position: relative; min-width: 10000px; }
        
        .video-clip { 
            position: absolute; height: 40px; top: 5px; background: #2a2a2a; border: 1.5px solid #444; 
            border-radius: 4px; display: flex; align-items: center; padding: 0 10px; font-size: 10px; color: #fff;
        }

        /* Bottom Navigation */
        .bottom-nav { height: 60px; background: #000; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #1a1a1a; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #888; cursor: pointer; }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 10px; }
        .nav-item.active { color: #fff; }

        /* Custom Play/Pause Overlay */
        .play-btn { 
            width: 50px; height: 50px; background: rgba(255,255,255,0.1); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; position: absolute;
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <h1 class="shakil-brand">SHAKIL</h1>
    </div>

    <div class="app-container" id="app">
        <header>
            <i class="fa-solid fa-chevron-left"></i>
            <span class="text-xs font-bold tracking-widest">1080P</span>
            <button class="bg-blue-600 px-4 py-1 rounded text-xs font-bold">Export</button>
        </header>

        <div class="preview-window">
            <video id="player" src="" playsinline></video>
            <div class="play-btn" onclick="togglePlay()"><i id="play-ico" class="fa-solid fa-play"></i></div>
        </div>

        <div class="timeline-container">
            <div class="timeline-controls">
                <span id="currentTime">00:00</span>
                <div class="flex gap-4">
                    <i class="fa-solid fa-rotate-left"></i>
                    <i class="fa-solid fa-rotate-right"></i>
                </div>
            </div>

            <div class="timeline-scroll" id="scroll-box">
                <div class="playhead-center"></div>
                <div class="track-row" id="video-track">
                    </div>
                <div class="track-row" id="audio-track"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="document.getElementById('file-upload').click()">
                <i class="fa-solid fa-plus-square"></i>
                <span>Add Media</span>
            </div>
            <div class="nav-item" onclick="openDub()">
                <i class="fa-solid fa-microphone"></i>
                <span>Audio</span>
            </div>
            <div class="nav-item">
                <i class="fa-solid fa-font"></i>
                <span>Text</span>
            </div>
            <div class="nav-item">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <span>Effects</span>
            </div>
        </div>
    </div>

    <input type="file" id="file-upload" class="hidden" onchange="uploadMedia(this)">

    <script>
        const video = document.getElementById('player');
        const playIco = document.getElementById('play-ico');
        const scrollBox = document.getElementById('scroll-box');
        const timeDisplay = document.getElementById('currentTime');

        // Intro GSAP
        window.onload = () => {
            gsap.to("#app", { duration: 1, opacity: 1, delay: 2 });
            gsap.to("#intro-overlay", { duration: 1.2, y: "-100%", delay: 1.5, ease: "power4.inOut" });
        };

        function togglePlay() {
            if(!video.src) return;
            video.paused ? (video.play(), playIco.className='fa-solid fa-pause') : (video.pause(), playIco.className='fa-solid fa-play');
        }

        async function uploadMedia(input) {
            const fd = new FormData();
            fd.append('files', input.files[0]);
            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            
            video.src = data.files[0].url;
            document.getElementById('video-track').innerHTML = `
                <div class="video-clip" style="left: 50%; width: ${video.duration * 50 || 1000}px">
                    ${input.files[0].name}
                </div>`;
            video.play();
            playIco.className='fa-solid fa-pause';
        }

        // Timeline Scroll Sync (CapCut Style)
        video.ontimeupdate = () => {
            const t = video.currentTime;
            const minutes = Math.floor(t / 60).toString().padStart(2, '0');
            const seconds = Math.floor(t % 60).toString().padStart(2, '0');
            timeDisplay.innerText = `${minutes}:${seconds}`;
            
            // Scroll logic: 50px per second
            scrollBox.scrollLeft = t * 50;
        };

        // Manual Seek (Scroll on Timeline)
        scrollBox.onscroll = () => {
            if(video.paused) {
                video.currentTime = scrollBox.scrollLeft / 50;
            }
        };

        function openDub() {
            alert("ডাবিং অপশন লোড হচ্ছে...");
            // এখানে আপনার আগের ডাবিং পপআপ কোডটি বসানো যাবে
        }
    </script>
</body>
</html>
