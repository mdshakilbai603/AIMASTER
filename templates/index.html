<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Master | Ultimate Studio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;700;900&display=swap');
        
        :root { --c: #00f5ff; --p: #bd00ff; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; touch-action: manipulation; }

        /* --- GSAP Intro (Premium) --- */
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .ring { position: absolute; border: 2px solid var(--c); border-radius: 50%; opacity: 0; }
        .shakil-name { font-family: 'Montserrat'; font-size: clamp(2.5rem, 8vw, 5rem); background: linear-gradient(90deg, #fff, var(--c), var(--p), #fff); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; opacity: 0; text-align: center; }
        @keyframes shine { to { background-position: 200% center; } }

        /* --- Mobile-Ready UI --- */
        .glass { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        
        .main-btn { background: #fff; color: #000; font-weight: 900; padding: 12px 24px; border-radius: 50px; font-size: 11px; text-transform: uppercase; transition: 0.3s; }
        .dub-btn-glow { background: linear-gradient(135deg, var(--c), var(--p)); box-shadow: 0 0 20px rgba(0, 245, 255, 0.5); border: none; color: #000; }

        /* Timeline Engine */
        .timeline-box { height: 150px; background: #050505; position: relative; overflow-x: auto; border-top: 1px solid #111; -webkit-overflow-scrolling: touch; }
        .playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #ff0055; z-index: 50; pointer-events: none; }
        .track { height: 35px; background: rgba(255,255,255,0.02); margin: 10px 0; border-radius: 6px; position: relative; min-width: 3000px; }
        .clip { position: absolute; height: 25px; top: 5px; background: var(--c); color: #000; font-size: 9px; font-weight: 900; border-radius: 4px; padding: 0 8px; display: flex; align-items: center; white-space: nowrap; }

        /* Video Area */
        .video-container { background: #000; width: 100%; max-width: 900px; aspect-ratio: 16/9; position: relative; border-radius: 15px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body class="flex flex-col">

    <div id="intro-overlay">
        <div class="ring" style="width: 200px; height: 200px;" id="r1"></div>
        <div class="ring" style="width: 300px; height: 300px; border-color: var(--p);" id="r2"></div>
        <h1 class="shakil-name" id="sn">SHAKIL</h1>
        <p id="sw" class="text-[8px] tracking-[10px] text-zinc-500 opacity-0 mt-4 uppercase font-bold">AI Master Studio</p>
    </div>

    <div id="app" class="flex-1 flex flex-col opacity-0">
        <header class="h-14 px-4 flex items-center justify-between border-b border-white/5 bg-black/90">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 bg-white rounded flex items-center justify-center text-black font-black text-[10px]">AI</div>
                <h1 class="font-black text-xs uppercase tracking-tighter">AI Master</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="openDub()" class="main-btn dub-btn-glow">Dubbing</button>
                <button onclick="exportVideo()" class="main-btn px-4"><i class="fa-solid fa-download"></i></button>
            </div>
        </header>

        <main class="flex-1 flex flex-col md:flex-row overflow-hidden p-2 gap-2">
            <aside class="w-full md:w-64 glass p-4 flex flex-col gap-4">
                <button onclick="document.getElementById('fin').click()" class="w-full py-6 border-2 border-dashed border-zinc-800 rounded-2xl text-[10px] text-zinc-500 hover:border-cyan-500 transition uppercase font-bold">
                    <i class="fa-solid fa-cloud-arrow-up block text-xl mb-2"></i> Upload Video
                </button>
                <input type="file" id="fin" class="hidden" accept="video/*" onchange="handleUpload(this)">
                <div id="asset-info" class="text-[9px] text-zinc-600 uppercase text-center mt-2">No video selected</div>
            </aside>

            <section class="flex-1 flex items-center justify-center p-2">
                <div class="video-container glass">
                    <video id="v-player" playsinline preload="auto"></video>
                    
                    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex items-center gap-6 bg-black/60 backdrop-blur-md px-6 py-2 rounded-full border border-white/10">
                        <button onclick="step(-5)" class="text-zinc-400 text-xs"><i class="fa-solid fa-backward"></i></button>
                        <button onclick="toggle()" class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center text-sm shadow-xl active:scale-90 transition">
                            <i id="p-ico" class="fa-solid fa-play"></i>
                        </button>
                        <button onclick="step(5)" class="text-zinc-400 text-xs"><i class="fa-solid fa-forward"></i></button>
                    </div>
                </div>
            </section>
        </main>

        <div class="timeline-box" id="tl-area" onclick="seekTimeline(event)">
            <div id="playhead" class="playhead"></div>
            <div class="px-20 py-4">
                <div id="track-v" class="track"></div>
                <div id="track-a" class="track"></div>
            </div>
            <div class="absolute bottom-2 left-4 text-[10px] font-mono text-cyan-400" id="clock">00:00:00</div>
        </div>
    </div>

    <div id="dub-modal" class="hidden fixed inset-0 bg-black/98 z-[99999] flex items-center justify-center p-6 backdrop-blur-2xl">
        <div class="glass w-full max-w-sm p-8 text-center">
            <h2 class="text-xl font-black mb-1 uppercase text-cyan-400">AI Voice Dubbing</h2>
            <p class="text-[8px] text-zinc-500 tracking-[4px] uppercase mb-6">Real-Time Lip Sync</p>
            <textarea id="dub-txt" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-xl outline-none focus:border-cyan-500 text-sm mb-6 h-28 text-white" placeholder="এখানে সংলাপ লিখুন..."></textarea>
            <div class="flex gap-3">
                <button onclick="closeDub()" class="flex-1 text-[10px] font-bold text-zinc-600 uppercase">Cancel</button>
                <button onclick="runDub()" id="dub-exec" class="flex-[2] main-btn dub-btn-glow">Generate Sync</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('v-player');
        const playIco = document.getElementById('p-ico');
        const playhead = document.getElementById('playhead');
        const clock = document.getElementById('clock');
        const SCALE = 40; // Pixels per second

        // Intro GSAP
        window.addEventListener('load', () => {
            const tl = gsap.timeline();
            tl.to("#r1", { duration: 1.2, opacity: 0.5, scale: 2.2, ease: "power4.out" })
              .to("#r2", { duration: 1.2, opacity: 0.3, scale: 2.8, ease: "power4.out" }, "-=0.8")
              .to("#sn", { duration: 1.2, opacity: 1, scale: 1.1, ease: "back.out(1.7)" }, "-=0.8")
              .to("#sw", { duration: 0.8, opacity: 1, y: -5, ease: "power2.out" }, "-=0.4")
              .to("#intro-overlay", { duration: 1, y: "-100%", ease: "expo.inOut", delay: 0.8 })
              .to("#app", { duration: 1, opacity: 1, ease: "power2.out" }, "-=0.5");
        });

        function toggle() {
            if(!video.src) return alert("প্রথমে একটি ভিডিও আপলোড করুন!");
            if(video.paused) { video.play(); playIco.className = 'fa-solid fa-pause'; }
            else { video.pause(); playIco.className = 'fa-solid fa-play'; }
        }

        async function handleUpload(input) {
            if(!input.files[0]) return;
            const file = input.files[0];
            const url = URL.createObjectURL(file);
            video.src = url;
            video.load();
            
            document.getElementById('asset-info').innerText = file.name;
            document.getElementById('track-v').innerHTML = `<div class="clip w-[2000px]">${file.name}</div>`;
            
            video.onloadedmetadata = () => {
                video.play();
                playIco.className = 'fa-solid fa-pause';
            };
        }

        video.ontimeupdate = () => {
            const t = video.currentTime;
            playhead.style.left = (t * SCALE + 80) + "px";
            
            const m = Math.floor(t / 60).toString().padStart(2,'0');
            const s = Math.floor(t % 60).toString().padStart(2,'0');
            const ms = Math.floor((t % 1) * 100).toString().padStart(2,'0');
            clock.innerText = `${m}:${s}:${ms}`;
        };

        function seekTimeline(e) {
            const rect = document.getElementById('tl-area').getBoundingClientRect();
            const clickX = e.clientX - rect.left + document.getElementById('tl-area').scrollLeft - 80;
            video.currentTime = clickX / SCALE;
        }

        function step(v) { video.currentTime += v; }

        function exportVideo() {
            if(!video.src) return alert("ডাউনলোড করার জন্য কোনো ভিডিও নেই!");
            const a = document.createElement('a');
            a.href = video.src;
            a.download = "shakil_ai_studio.mp4";
            a.click();
        }

        function openDub() { document.getElementById('dub-modal').classList.remove('hidden'); }
        function closeDub() { document.getElementById('dub-modal').classList.add('hidden'); }

        async function runDub() {
            const text = document.getElementById('dub-txt').value;
            const btn = document.getElementById('dub-exec');
            if(!text) return alert("সংলাপ লিখুন!");
            
            btn.innerText = "Syncing...";
            const res = await fetch('/api/generate-dub', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text })
            });
            const data = await res.json();
            
            if(data.status === 'success') {
                const audio = new Audio(data.audio_url);
                audio.play();
                const pos = video.currentTime * SCALE;
                document.getElementById('track-a').innerHTML += `<div class="clip" style="left:${pos}px; background:#fff; color:#000">AI SYNCED</div>`;
            }
            btn.innerText = "Generate Sync";
            closeDub();
        }
    </script>
</body>
</html>
