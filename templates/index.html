<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master | Video Editor by Shakil</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Montserrat:wght@100;400;900&display=swap');
        
        :root {
            --accent-1: #00f5ff; /* সায়ান */
            --accent-2: #bd00ff; /* পার্পল */
            --bg-deep: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- GSAP INTRO (WHITE & CLEAN) --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .intro-name {
            font-size: clamp(3rem, 12vw, 7rem);
            font-weight: 900;
            letter-spacing: -2px;
            color: #ffffff; /* সাদা কণ্ঠ */
            position: relative;
            opacity: 0;
            font-family: 'Montserrat', sans-serif;
        }

        /* --- NEW COLOR UI (ছবিটির মতো) --- */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 20px;
            transition: all 0.3s;
        }
        
        .glass-panel:hover {
            box-shadow: 0 0 30px rgba(189, 0, 255, 0.1);
            border-color: rgba(189, 0, 255, 0.3);
        }

        .neon-btn {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: #000;
            font-weight: 800;
            padding: 10px 25px;
            border-radius: 50px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 11px;
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
        }

        .neon-btn:hover {
            box-shadow: 0 0 25px rgba(0, 245, 255, 0.5);
            transform: scale(1.05);
        }

        /* --- TIMELINE DESIGN --- */
        .timeline-container {
            background: #080808;
            height: 200px;
            border-top: 1px solid var(--border);
            border-radius: 30px 30px 0 0;
        }

        .playhead {
            position: absolute;
            top: 0; bottom: 0;
            width: 3px;
            background: var(--accent-1);
            box-shadow: 0 0 15px var(--accent-1);
            z-index: 10;
        }

        .track {
            height: 42px;
            background: rgba(255,255,255,0.02);
            margin: 10px 0;
            border-radius: 10px;
            position: relative;
            min-width: 5000px;
        }

        .clip {
            position: absolute;
            height: 32px;
            top: 5px;
            border-radius: 8px;
            background: var(--accent-1);
            color: #000;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            padding: 0 10px;
            cursor: pointer;
        }
        
        .audio-clip {
            background: var(--accent-2);
            color: #fff;
        }
    </style>
</head>
<body class="flex flex-col">

    <div id="intro-overlay">
        <h1 class="intro-name" id="shakil-text">SHAKIL</h1>
        <div id="intro-bar" class="w-0 h-[2px] bg-cyan-400 mt-4"></div>
    </div>

    <div id="app" class="flex-1 flex flex-col opacity-0">
        <header class="h-16 px-8 flex items-center justify-between border-b border-white/5 bg-black/50 backdrop-blur-md">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-400 to-purple-600 flex items-center justify-center text-xl font-black">
                    AI
                </div>
                <h1 class="font-black text-xl tracking-tighter uppercase">AI Master</h1>
            </div>

            <div class="flex items-center gap-6">
                <button onclick="openDub()" class="text-[10px] font-bold text-zinc-400 hover:text-white transition uppercase tracking-widest">Auto Dubbing</button>
                <button class="neon-btn">Export</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden px-2">
            <aside class="w-20 md:w-72 glass-panel p-6 flex flex-col gap-6 m-1">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Library</span>
                    <button onclick="document.getElementById('f-in').click()" class="text-cyan-400"><i class="fa-solid fa-plus"></i></button>
                </div>
                <input type="file" id="f-in" class="hidden" multiple onchange="handleUpload(this)">
                
                <div id="media-list" class="flex-1 overflow-y-auto space-y-3 pr-2">
                    </div>
            </aside>

            <section class="flex-1 flex flex-col p-3">
                <div class="flex-1 glass-panel relative overflow-hidden flex items-center justify-center bg-black/40">
                    <video id="v-player" class="max-w-full max-h-full rounded-xl shadow-2xl"></video>
                    
                    <div class="absolute bottom-10 flex items-center gap-10 bg-black/60 backdrop-blur-xl px-10 py-5 rounded-full border border-white/10 opacity-0 hover:opacity-100 transition-all duration-500">
                        <button class="text-zinc-500 hover:text-white transition"><i class="fa-solid fa-backward-step"></i></button>
                        <button onclick="toggle()" class="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center text-xl shadow-xl hover:scale-105 transition">
                            <i id="p-ico" class="fa-solid fa-play"></i>
                        </button>
                        <button class="text-zinc-500 hover:text-white transition"><i class="fa-solid fa-forward-step"></i></button>
                    </div>
                </div>

                <div class="timeline-container mt-2 p-8 relative">
                    <div class="flex justify-between items-center mb-6 sticky left-0 z-50">
                        <span id="timer" class="text-3xl font-black font-mono text-cyan-400">00:00:00</span>
                        <button class="bg-cyan-600 px-4 py-1.5 rounded-full text-[10px] font-bold">Add Track</button>
                    </div>
                    
                    <div class="relative overflow-x-auto h-24" id="timeline-scroll">
                        <div id="playhead" class="playhead"></div>
                        <div id="v-track" class="track"></div>
                        <div id="a-track" class="track"></div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <div id="dub-modal" class="hidden fixed inset-0 bg-black/95 z-[1000] flex items-center justify-center p-6 backdrop-blur-3xl">
        <div class="w-full max-w-md glass-panel p-10">
            <h2 class="text-2xl font-black mb-1 uppercase">Cosmic <span class="text-cyan-400">Dubber</span></h2>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[5px] mb-8">Professional Movie Dubbing</p>
            <textarea id="dub-txt" class="w-full bg-zinc-950 border border-white/10 p-5 rounded-2xl outline-none focus:border-cyan-500 transition h-36 text-sm mb-6" placeholder="সংলাপটি এখানে লিখুন..."></textarea>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <label class="cursor-pointer">
                    <input type="radio" name="v" value="male" class="hidden peer">
                    <div class="p-4 rounded-2xl bg-zinc-950 border border-white/5 peer-checked:bg-white peer-checked:text-black text-center transition flex flex-col items-center">
                        <i class="fa-solid fa-mars text-xl mb-1"></i><span class="text-[10px] font-bold uppercase">Actor</span>
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="v" value="female" checked class="hidden peer">
                    <div class="p-4 rounded-2xl bg-zinc-950 border border-white/5 peer-checked:bg-white peer-checked:text-black text-center transition flex flex-col items-center">
                        <i class="fa-solid fa-venus text-xl mb-1"></i><span class="text-[10px] font-bold uppercase">Actress</span>
                    </div>
                </label>
            </div>

            <div class="flex gap-4">
                <button onclick="closeDub()" class="flex-1 py-4 text-xs font-bold text-zinc-500 uppercase tracking-widest">Cancel</button>
                <button id="dub-btn" onclick="runDub()" class="flex-[2] neon-btn">Generate & Sync Voice</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('v-player');
        const playIco = document.getElementById('p-ico');
        const playhead = document.getElementById('playhead');

        // --- GSAP COSMIC ANIMATION (সাদা কণ্ঠে) ---
        window.addEventListener('load', () => {
            const tl = gsap.timeline();
            
            tl.to("#shakil-text", { duration: 1.5, opacity: 1, y: -20, ease: "power4.out" })
              .to("#intro-bar", { duration: 1, w: "200px", ease: "expo.inOut" }, "-=0.5")
              .to("#intro-overlay", { duration: 1.2, scale: 1.5, opacity: 0, display: "none", ease: "power4.inOut", delay: 0.5 })
              .to("#app", { duration: 1, opacity: 1, ease: "power2.out" }, "-=0.5");
        });

        function toggle() {
            if (video.paused) { video.play(); playIco.className = 'fa-solid fa-pause'; }
            else { video.pause(); playIco.className = 'fa-solid fa-play'; }
        }

        async function handleUpload(input) {
            const fd = new FormData();
            for(let f of input.files) fd.append('files', f);
            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            
            if(data.uploaded.length > 0) {
                const url = `/uploads/${data.uploaded[0]}`;
                video.src = url;
                document.getElementById('v-track').innerHTML = `<div class="clip w-[1500px] animate__animated animate__fadeInLeft">${data.uploaded[0]}</div>`;
                video.play();
                playIco.className = 'fa-solid fa-pause';
            }
        }

        function openDub() { document.getElementById('dub-modal').classList.remove('hidden'); }
        function closeDub() { document.getElementById('dub-modal').classList.add('hidden'); }

        async function runDub() {
            const text = document.getElementById('dub-txt').value;
            const gender = document.querySelector('input[name="v"]:checked').value;
            if(!text) return;

            const res = await fetch('/api/generate-dub', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text, gender })
            });
            const data = await res.json();
            if(data.status === 'success') {
                const audio = new Audio(data.audio_url);
                audio.play();
                const pos = video.currentTime;
                document.getElementById('a-track').innerHTML += `<div class="clip audio-clip w-60" style="left:${pos * 40}px">Sync: ${gender.toUpperCase()}</div>`;
            }
            closeDub();
        }

        video.ontimeupdate = () => {
            const t = video.currentTime;
            document.getElementById('timer').innerText = t.toFixed(2).padStart(5, '0');
            playhead.style.left = (t * 40) + "px";
        };
    </script>
</body>
</html>
