<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master Pro | Fast & Modern</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap');
        
        :root {
            --aurora: linear-gradient(135deg, #00f5ff, #bd00ff);
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* --- ফাস্ট লোডিং এনিমেশন --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .shakil-name {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            background: var(--aurora);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
        }

        /* --- মোবাইল অপ্টিমাইজড গ্লাস প্যানেল --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
        }

        /* --- কাস্টম টাইমলাইন --- */
        .timeline-area {
            background: #050505;
            height: 180px;
            border-top: 1px solid #1a1a1a;
        }

        .track-line {
            height: 35px;
            background: rgba(255,255,255,0.02);
            margin: 5px 0;
            border-radius: 5px;
            position: relative;
            min-width: 2000px;
        }

        .playhead-line {
            position: absolute;
            top: 0; bottom: 0;
            width: 2px;
            background: #ff3344;
            box-shadow: 0 0 10px #ff3344;
            z-index: 50;
        }

        /* মোবাইল স্ক্রিন সেটিংস */
        @media (max-width: 768px) {
            .hide-mobile { display: none; }
            .mobile-scroll { overflow-x: auto; }
        }
    </style>
</head>
<body class="flex flex-col">

    <div id="intro-overlay">
        <h1 class="shakil-name">SHAKIL</h1>
        <p class="text-[10px] tracking-[10px] text-zinc-500 mt-4 uppercase">AI Master Pro</p>
    </div>

    <div id="app-content" class="flex-1 flex flex-col opacity-0 transition-all duration-1000">
        
        <header class="h-14 flex items-center justify-between px-6 border-b border-white/5">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 bg-cyan-500 rounded-md rotate-45"></div>
                <h1 class="font-black text-sm uppercase tracking-tighter">AI Master <span class="text-cyan-400">Pro</span></h1>
            </div>
            <div class="flex gap-3">
                <button onclick="openDub()" class="text-[10px] font-bold text-zinc-400 uppercase">Dubbing</button>
                <button class="bg-white text-black text-[10px] px-4 py-1.5 rounded-full font-black uppercase">Export</button>
            </div>
        </header>

        <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
            <aside class="w-full md:w-64 border-r border-white/5 p-4 flex flex-col hide-mobile">
                <h3 class="text-[10px] font-bold text-zinc-500 uppercase mb-4">Library</h3>
                <div id="media-list" class="flex-1 overflow-y-auto space-y-2">
                    </div>
                <button onclick="document.getElementById('file-in').click()" class="mt-4 w-full py-3 border border-dashed border-zinc-700 rounded-xl text-[10px] text-zinc-500">
                    + Add Media
                </button>
                <input type="file" id="file-in" class="hidden" multiple onchange="handleUpload(this)">
            </aside>

            <section class="flex-1 flex flex-col bg-[#020202]">
                <div class="flex-1 relative flex items-center justify-center p-4">
                    <div class="glass-card w-full max-w-4xl aspect-video relative overflow-hidden flex items-center justify-center">
                        <video id="v-player" class="max-w-full max-h-full"></video>
                        
                        <div class="absolute bottom-4 flex items-center gap-6 bg-black/40 backdrop-blur-md px-6 py-3 rounded-full border border-white/10">
                            <button onclick="toggle()" class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center">
                                <i id="p-ico" class="fa-solid fa-play"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="timeline-area p-4">
                    <div class="flex justify-between items-center mb-3">
                        <span id="timer" class="text-xl font-mono text-cyan-400">00:00</span>
                        <div class="h-1 w-20 bg-zinc-800 rounded-full"></div>
                    </div>
                    <div class="relative overflow-x-auto mobile-scroll pb-2">
                        <div id="playhead" class="playhead-line"></div>
                        <div id="v-track" class="track-line"></div>
                        <div id="a-track" class="track-line"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="dub-modal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-sm p-8 text-center">
            <h2 class="text-xl font-black mb-4 uppercase">AI Voice Dub</h2>
            <textarea id="dub-text" class="w-full bg-black border border-white/10 p-4 rounded-xl text-sm mb-4 outline-none focus:border-cyan-500" placeholder="সংলাপ লিখুন..."></textarea>
            <div class="flex gap-2">
                <button onclick="closeDub()" class="flex-1 py-3 text-xs text-zinc-500 font-bold uppercase">Cancel</button>
                <button onclick="runDub()" class="flex-[2] bg-cyan-500 text-black py-3 rounded-xl text-xs font-black uppercase">Sync Voice</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('v-player');
        const playIco = document.getElementById('p-ico');
        const playhead = document.getElementById('playhead');

        // লোডিং শেষ হলে ইন্ট্রো সরিয়ে অ্যাপ দেখানো
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('intro-overlay').style.transform = 'translateY(-100%)';
                document.getElementById('app-content').classList.replace('opacity-0', 'opacity-100');
            }, 1500);
        });

        function toggle() {
            if (video.paused) { video.play(); playIco.className = 'fa-solid fa-pause'; }
            else { video.pause(); playIco.className = 'fa-solid fa-play'; }
        }

        async function handleUpload(input) {
            const fd = new FormData();
            for(let f of input.files) fd.append('files', f);
            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            
            // ভিডিও প্লেয়ারে প্রথম ফাইলটি সেট করা
            if(data.uploaded.length > 0) {
                const url = `/uploads/${data.uploaded[0]}`;
                video.src = url;
                document.getElementById('v-track').innerHTML = `<div class="absolute h-full bg-cyan-500/30 border-l-2 border-cyan-400 px-2 text-[8px] flex items-center overflow-hidden">${data.uploaded[0]}</div>`;
                video.play();
                playIco.className = 'fa-solid fa-pause';
            }
        }

        function openDub() { document.getElementById('dub-modal').classList.remove('hidden'); }
        function closeDub() { document.getElementById('dub-modal').classList.add('hidden'); }

        async function runDub() {
            const text = document.getElementById('dub-text').value;
            if(!text) return;
            
            const res = await fetch('/api/generate-dub', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text })
            });
            const data = await res.json();
            if(data.status === 'success') {
                new Audio(data.audio_url).play();
                closeDub();
            }
        }

        video.ontimeupdate = () => {
            const t = video.currentTime;
            const m = Math.floor(t / 60);
            const s = Math.floor(t % 60);
            document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2, '0')}`;
            playhead.style.left = (t * 20) + "px"; // মোবাইল অনুযায়ী স্কেল কমানো হয়েছে
        };
    </script>
</body>
</html>
