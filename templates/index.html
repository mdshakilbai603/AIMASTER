<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Master Studio | Premium GSAP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;900&family=Syncopate:wght@700&display=swap');
        
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }

        /* --- GSAP ORBITAL RING DESIGN (আপনার পছন্দের সেই ডিজাইন) --- */
        #ring-loader {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .ring-container { position: relative; width: 250px; height: 250px; display: flex; align-items: center; justify-content: center; }
        
        .orbit {
            position: absolute; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .ring-1 { width: 250px; height: 250px; border-top: 2px solid #00f5ff; }
        .ring-2 { width: 180px; height: 180px; border-bottom: 2px solid #bd00ff; }
        
        .shakil-brand {
            font-family: 'Syncopate', sans-serif; font-size: 32px; font-weight: 700;
            letter-spacing: 15px; text-transform: uppercase; opacity: 0;
            background: linear-gradient(to right, #00f5ff, #bd00ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- STUDIO UI DESIGN --- */
        .glass-panel { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 40px; }
        .main-app { padding: 15px; height: 100vh; display: flex; flex-direction: column; opacity: 0; }
        
        /* CapCut Style Timeline */
        .timeline-container { height: 200px; background: #080808; border-radius: 40px 40px 0 0; position: relative; overflow-x: auto; border-top: 1px solid #151515; }
        .playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #00f5ff; z-index: 100; box-shadow: 0 0 15px #00f5ff; }
        .track { height: 45px; background: rgba(255,255,255,0.01); margin: 10px 0; border-radius: 12px; position: relative; min-width: 5000px; }
        .clip { position: absolute; height: 35px; top: 5px; background: linear-gradient(90deg, #00f5ff, #bd00ff); border-radius: 10px; color: #000; font-size: 10px; font-weight: 900; display: flex; align-items: center; padding: 0 15px; }

        .btn-premium { background: #fff; color: #000; font-weight: 900; padding: 14px 30px; border-radius: 100px; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 10px 30px rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="ring-loader">
        <div class="ring-container">
            <div class="orbit ring-1" id="r1"></div>
            <div class="orbit ring-2" id="r2"></div>
            <h1 class="shakil-brand" id="b-text">SHAKIL</h1>
        </div>
    </div>

    <div class="main-app" id="studio-ui">
        <header class="h-24 flex items-center justify-between px-10">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 glass-panel flex items-center justify-center font-black text-cyan-400 text-xl">S</div>
                <h2 class="text-[10px] font-light tracking-[10px] text-zinc-500 uppercase">AI Master Pro</h2>
            </div>
            <div class="flex gap-4">
                <button onclick="openDub()" class="btn-premium">AI Dubbing</button>
                <button onclick="exportVideo()" class="w-14 h-14 glass-panel flex items-center justify-center text-zinc-400"><i class="fa-solid fa-download"></i></button>
            </div>
        </header>

        <main class="flex-1 flex flex-col md:flex-row gap-4 p-2 overflow-hidden">
            <div class="flex-[3] glass-panel relative flex items-center justify-center overflow-hidden bg-black/40">
                <video id="v-player" class="max-w-full max-h-full rounded-3xl" playsinline></video>
                <div class="absolute bottom-10 flex gap-12 bg-black/60 backdrop-blur-3xl px-12 py-5 rounded-full border border-white/5">
                    <button onclick="toggle()" class="text-2xl text-white"><i id="p-ico" class="fa-solid fa-play"></i></button>
                </div>
            </div>

            <aside class="flex-1 glass-panel p-8 flex flex-col gap-6">
                <div onclick="document.getElementById('f-in').click()" class="border border-white/5 rounded-[40px] p-12 text-center cursor-pointer hover:bg-white/5 transition-all">
                    <i class="fa-solid fa-plus text-3xl mb-4 text-zinc-700"></i>
                    <p class="text-[9px] font-bold uppercase tracking-widest text-zinc-500">Add Media</p>
                </div>
                <input type="file" id="f-in" class="hidden" onchange="upload(this)">
                <div id="f-name" class="text-[10px] text-zinc-600 uppercase text-center font-bold">Waiting for input...</div>
            </aside>
        </main>

        <div class="timeline-container" id="tl-box" onclick="seek(event)">
            <div id="playhead" class="playhead"></div>
            <div class="px-24 py-10">
                <div id="v-track" class="track"></div>
                <div id="a-track" class="track"></div>
            </div>
            <div id="clock" class="absolute bottom-6 left-12 text-xs font-mono text-cyan-400/50">00:00:00</div>
        </div>
    </div>

    <div id="dub-modal" class="hidden fixed inset-0 bg-black/98 z-[11000] flex items-center justify-center p-8 backdrop-blur-3xl">
        <div class="glass-panel w-full max-w-lg p-14 text-center">
            <h3 class="text-xl font-light tracking-[12px] mb-10 uppercase">AI Sync Engine</h3>
            <textarea id="dub-in" class="w-full bg-transparent border border-white/5 p-8 rounded-[35px] text-sm h-48 mb-10 focus:border-cyan-500 outline-none text-white" placeholder="Enter script..."></textarea>
            <div class="flex gap-6">
                <button onclick="closeDub()" class="text-[10px] font-bold text-zinc-600 uppercase">Close</button>
                <button onclick="runDub()" id="d-btn" class="flex-1 btn-premium">Merge Audio</button>
            </div>
        </div>
    </div>

    <script>
        const v = document.getElementById('v-player');
        const pIco = document.getElementById('p-ico');
        const phead = document.getElementById('playhead');

        // --- GSAP Ring Animation (Back to Original Cool Style) ---
        window.onload = () => {
            gsap.to("#r1", { duration: 3, rotate: 360, repeat: -1, ease: "none" });
            gsap.to("#r2", { duration: 2.5, rotate: -360, repeat: -1, ease: "none" });
            
            const tl = gsap.timeline();
            tl.to("#b-text", { duration: 1.5, opacity: 1, letterSpacing: "10px", ease: "power3.out" })
              .to("#ring-loader", { duration: 1.2, y: "-100%", ease: "expo.inOut", delay: 1 })
              .to("#studio-ui", { duration: 1, opacity: 1, ease: "power2.out" }, "-=0.5");
        };

        function toggle() {
            if(!v.src) return;
            if(v.paused) { v.play(); pIco.className = 'fa-solid fa-pause'; }
            else { v.pause(); pIco.className = 'fa-solid fa-play'; }
        }

        async function upload(input) {
            const fd = new FormData();
            fd.append('files', input.files[0]);
            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            v.src = data.files[0].url;
            document.getElementById('f-name').innerText = input.files[0].name;
            document.getElementById('v-track').innerHTML = `<div class="clip w-[4000px]">${input.files[0].name}</div>`;
            v.play(); pIco.className = 'fa-solid fa-pause';
        }

        v.ontimeupdate = () => {
            const t = v.currentTime;
            phead.style.left = (t * 50 + 96) + "px";
            document.getElementById('clock').innerText = new Date(t * 1000).toISOString().substr(11, 8);
        };

        function seek(e) {
            const x = e.clientX - document.getElementById('tl-box').getBoundingClientRect().left + document.getElementById('tl-box').scrollLeft - 96;
            v.currentTime = x / 50;
        }

        function openDub() { document.getElementById('dub-modal').classList.remove('hidden'); }
        function closeDub() { document.getElementById('dub-modal').classList.add('hidden'); }

        async function runDub() {
            const btn = document.getElementById('d-btn');
            btn.innerText = "Processing...";
            const res = await fetch('/api/generate-dub', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text: document.getElementById('dub-in').value })
            });
            const data = await res.json();
            new Audio(data.audio_url).play();
            document.getElementById('a-track').innerHTML += `<div class="clip" style="left:${v.currentTime*50}px; background:#fff; color:#000">AI SYNC</div>`;
            btn.innerText = "Merge Audio";
            closeDub();
        }

        function exportVideo() {
            const a = document.createElement('a');
            a.href = v.src; a.download = "Shakil_AI.mp4"; a.click();
        }
    </script>
</body>
</html>
