<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master | Shakil</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@700;900&display=swap');
        
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; height: 100vh; }

        /* --- সেই প্রথম প্রিমিয়াম এনিমেশন (Cosmic Rings) --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cosmic-ring {
            position: absolute;
            width: 300px; height: 300px;
            border-radius: 50%;
            border: 2px solid #00f5ff;
            opacity: 0;
            transform: scale(0) rotateX(75deg);
        }

        .shakil-title {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(to right, #fff, #00f5ff, #bd00ff, #fff);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flow 5s infinite linear;
            z-index: 10;
        }

        @keyframes flow { 0% { background-position: 0%; } 100% { background-position: 300%; } }

        /* --- মেইন অ্যাপ ডিজাইন (ছবির মতো ডার্ক ও গ্লোয়িং) --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
        }

        .action-btn {
            background: linear-gradient(135deg, #00f5ff, #bd00ff);
            color: #000; font-weight: 900;
            padding: 10px 25px; border-radius: 50px;
            text-transform: uppercase; font-size: 11px;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
        }
        
        /* টাইমলাইন সেটিংস */
        .timeline { background: #050505; border-top: 1px solid #111; border-radius: 40px 40px 0 0; }
        .playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #00f5ff; box-shadow: 0 0 10px #00f5ff; }
        .track { height: 45px; background: rgba(255,255,255,0.01); margin: 8px 0; border-radius: 12px; position: relative; min-width: 5000px; }
    </style>
</head>
<body class="flex flex-col">

    <div id="intro-overlay">
        <div class="cosmic-ring" id="ring-1"></div>
        <div class="cosmic-ring" id="ring-2" style="border-color: #bd00ff;"></div>
        <h1 class="shakil-title" id="main-name">SHAKIL</h1>
    </div>

    <div id="app" class="flex-1 flex flex-col opacity-0">
        <header class="h-16 px-8 flex items-center justify-between border-b border-white/5 bg-black/60">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center text-black font-black">S</div>
                <h1 class="font-black text-xl tracking-tighter uppercase">AI Master</h1>
            </div>
            <button class="action-btn">Export</button>
        </header>

        <main class="flex-1 flex overflow-hidden p-2">
            <aside class="w-72 glass-panel m-1 p-6 flex flex-col gap-4">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Media Assets</span>
                <div id="media-list" class="flex-1 overflow-y-auto space-y-3"></div>
                <button onclick="document.getElementById('f-in').click()" class="w-full py-4 border-2 border-dashed border-zinc-800 rounded-2xl text-[10px] text-zinc-600 hover:border-cyan-500 transition">+ Add Files</button>
                <input type="file" id="f-in" class="hidden" multiple onchange="handleUpload(this)">
            </aside>

            <section class="flex-1 flex flex-col m-1">
                <div class="flex-1 glass-panel relative flex items-center justify-center bg-black/40 overflow-hidden">
                    <video id="v-player" class="max-w-full max-h-full rounded-xl"></video>
                    <div class="absolute bottom-8 flex gap-8 bg-black/80 px-8 py-4 rounded-full border border-white/10">
                        <button onclick="toggle()" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center text-xl"><i id="p-ico" class="fa-solid fa-play"></i></button>
                    </div>
                </div>

                <div class="timeline mt-2 p-8 overflow-hidden">
                    <div class="flex justify-between items-center mb-4">
                        <span id="timer" class="text-3xl font-black font-mono">00:00:00</span>
                        <button onclick="openDub()" class="text-xs font-bold text-cyan-400 uppercase tracking-widest">AI Dubbing</button>
                    </div>
                    <div class="relative overflow-x-auto h-24" id="timeline-scroll">
                        <div id="playhead" class="playhead"></div>
                        <div id="v-track" class="track"></div>
                        <div id="a-track" class="track"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="dub-modal" class="hidden fixed inset-0 bg-black/95 z-[1000] flex items-center justify-center backdrop-blur-3xl">
        <div class="w-full max-w-md glass-panel p-10">
            <h2 class="text-2xl font-black mb-6 uppercase tracking-tighter text-cyan-400">AI Voice Sync</h2>
            <textarea id="dub-txt" class="w-full bg-zinc-950 border border-white/10 p-5 rounded-2xl outline-none focus:border-cyan-500 text-sm mb-6 h-32" placeholder="সংলাপটি লিখুন..."></textarea>
            <div class="flex gap-4">
                <button onclick="closeDub()" class="flex-1 text-zinc-600 font-bold uppercase text-xs">Cancel</button>
                <button onclick="runDub()" class="flex-[2] action-btn">Generate</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('v-player');
        const playIco = document.getElementById('p-ico');

        // --- সেই প্রথম GSAP এনিমেশন (Rings & Dynamic Scale) ---
        window.addEventListener('load', () => {
            const tl = gsap.timeline();
            tl.to("#ring-1", { duration: 1.5, opacity: 0.5, scale: 2.5, ease: "power4.out" })
              .to("#ring-2", { duration: 1.5, opacity: 0.3, scale: 3.2, ease: "power4.out" }, "-=1")
              .to("#main-name", { duration: 2, scale: 1.1, opacity: 1, ease: "elastic.out(1, 0.3)" }, "-=1")
              .to("#intro-overlay", { duration: 1.2, y: "-100%", ease: "expo.inOut", delay: 0.5 })
              .to("#app", { duration: 1, opacity: 1, ease: "power4.out" }, "-=0.8");
        });

        function toggle() {
            if (video.paused) { video.play(); playIco.className = 'fa-solid fa-pause'; }
            else { video.pause(); playIco.className = 'fa-solid fa-play'; }
        }

        async function handleUpload(input) {
            const fd = new FormData();
            for(let f of input.files) fd.append('files', f);
            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            if(data.uploaded.length > 0) {
                video.src = `/uploads/${data.uploaded[0]}`;
                document.getElementById('v-track').innerHTML = `<div class="absolute h-full bg-cyan-500/30 border-l-2 border-cyan-400 px-4 flex items-center text-[10px]">${data.uploaded[0]}</div>`;
                video.play(); playIco.className = 'fa-solid fa-pause';
            }
        }

        function openDub() { document.getElementById('dub-modal').classList.remove('hidden'); }
        function closeDub() { document.getElementById('dub-modal').classList.add('hidden'); }

        async function runDub() {
            const text = document.getElementById('dub-txt').value;
            const res = await fetch('/api/generate-dub', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text })
            });
            const data = await res.json();
            if(data.status === 'success') {
                new Audio(data.audio_url).play();
                closeDub();
            }
        }

        video.ontimeupdate = () => {
            document.getElementById('timer').innerText = video.currentTime.toFixed(2);
            document.getElementById('playhead').style.left = (video.currentTime * 40) + "px";
        };
    </script>
</body>
</html>
