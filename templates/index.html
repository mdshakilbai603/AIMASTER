<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Master | Video Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@400;700&display=swap');
        
        html, body { margin: 0; padding: 0; height: 100dvh; background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        
        #intro { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .shakil-text { font-family: 'Montserrat', sans-serif; font-size: 3.5rem; font-weight: 900; background: linear-gradient(90deg, #fff, #00f5ff, #bd00ff, #fff); background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradient 3s infinite; }
        @keyframes gradient { 0% { background-position: 0%; } 50% { background-position: 100%; } 100% { background-position: 0%; } }
        
        #app { display: none; flex-direction: column; height: 100%; width: 100%; }
        .top-bar { height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid #111; }
        
        .workspace { flex: 1; position: relative; background: #050505; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { max-width: 100%; max-height: 100%; }

        /* টেক্সট লেয়ার স্টাইল */
        .text-layer { position: absolute; color: white; font-size: 24px; font-weight: bold; cursor: move; user-select: none; white-space: nowrap; padding: 5px 10px; border: 1px dashed transparent; }
        .text-layer.active { border: 1px dashed #00f5ff; background: rgba(0,245,255,0.1); }
        
        .timeline-area { height: 240px; background: #0a0a0a; display: flex; flex-direction: column; border-top: 1px solid #222; }
        .tracks-container { flex: 1; position: relative; overflow-x: auto; padding-top: 10px; }
        .playhead { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #fff; z-index: 100; pointer-events: none; }
        
        .clip-track { position: absolute; height: 40px; background: #1a1a1a; border: 1.5px solid #444; border-radius: 4px; top: 10px; }
        
        .toolbar-wrapper { height: 85px; background: #000; border-top: 1px solid #111; position: relative; }
        .toolbar { display: flex; align-items: center; height: 100%; padding: 0 10px; overflow-x: auto; gap: 15px; }
        .tool-btn { display: flex; flex-direction: column; align-items: center; min-width: 55px; color: #777; font-size: 10px; cursor: pointer; }
        .tool-btn i { font-size: 18px; margin-bottom: 5px; }
        .tool-btn:active { color: #fff; }

        .sub-menu { display: none; width: 100%; height: 100%; position: absolute; top: 0; background: #000; align-items: center; padding: 0 15px; gap: 20px; z-index: 10; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div id="intro">
        <h1 class="shakil-text">SHAKIL</h1>
        <p class="text-cyan-400 text-[10px] tracking-[6px] mt-2 uppercase">AI Master</p>
    </div>

    <div id="app">
        <div class="top-bar">
            <i class="fa-solid fa-chevron-left text-gray-400" onclick="location.reload()"></i>
            <div class="flex gap-2">
                <button class="bg-zinc-800 px-3 py-1 rounded text-[10px]" onclick="applyRatio('9/16')">9:16</button>
                <button class="bg-blue-600 px-4 py-1 rounded text-[10px] font-bold" onclick="runExport()">EXPORT</button>
            </div>
        </div>

        <div class="workspace" id="canvas">
            <video id="main-video" playsinline></video>
            <div id="text-container"></div> <div id="upload-hint" onclick="document.getElementById('file-input').click()" class="absolute flex flex-col items-center cursor-pointer">
                <i class="fa-solid fa-circle-plus text-5xl text-blue-500 mb-2"></i>
                <p class="text-xs font-bold text-gray-400">Tap to start project</p>
            </div>
            <input type="file" id="file-input" class="hidden" accept="video/*" onchange="handleUpload(this)">
        </div>

        <div class="timeline-area">
            <div class="h-8 flex justify-between items-center px-4 bg-black/50 text-[10px] text-gray-400">
                <span id="time-val">00:00 / 00:00</span>
                <i class="fa-solid fa-play" id="play-icon" onclick="togglePlay()"></i>
            </div>
            <div class="tracks-container" id="timeline-scroll" onscroll="syncTimeline()">
                <div class="playhead"></div>
                <div id="v-clip" class="clip-track" style="display:none; left: 50%;"></div>
            </div>
        </div>

        <div class="toolbar-wrapper">
            <div class="toolbar" id="main-tools">
                <div class="tool-btn" onclick="openMenu('edit-menu')"><i class="fa-solid fa-scissors"></i>Edit</div>
                <div class="tool-btn" onclick="openMenu('text-menu')"><i class="fa-solid fa-font"></i>Text</div>
                <div class="tool-btn" onclick="openMenu('audio-menu')"><i class="fa-solid fa-music"></i>Audio</div>
                <div class="tool-btn" onclick="openDubbing()"><i class="fa-solid fa-microphone-lines text-cyan-400"></i>AI Dub</div>
                <div class="tool-btn" onclick="openMenu('filter-menu')"><i class="fa-solid fa-wand-magic-sparkles"></i>Filters</div>
            </div>

            <div class="sub-menu" id="edit-menu">
                <div onclick="closeMenu()"><i class="fa-solid fa-xmark"></i></div>
                <div class="tool-btn" onclick="splitVideo()"><i class="fa-solid fa-arrows-left-right"></i>Split</div>
                <div class="tool-btn" onclick="setSpeed(0.5)">0.5x</div>
                <div class="tool-btn" onclick="setSpeed(1.0)">Normal</div>
                <div class="tool-btn" onclick="setSpeed(2.0)">2x</div>
            </div>

            <div class="sub-menu" id="text-menu">
                <div onclick="closeMenu()"><i class="fa-solid fa-xmark"></i></div>
                <div class="tool-btn" onclick="addText()"><i class="fa-solid fa-plus"></i>Add Text</div>
                <div class="tool-btn"><i class="fa-solid fa-keyboard"></i>Style</div>
            </div>

            <div class="sub-menu" id="filter-menu">
                <div onclick="closeMenu()"><i class="fa-solid fa-xmark"></i></div>
                <div class="tool-btn" onclick="setFilter('none')">None</div>
                <div class="tool-btn" onclick="setFilter('grayscale(1)')">B&W</div>
                <div class="tool-btn" onclick="setFilter('sepia(0.8)')">Retro</div>
                <div class="tool-btn" onclick="setFilter('brightness(1.4)')">Vivid</div>
            </div>
        </div>
    </div>

    <div id="dub-modal" class="modal">
        <div class="modal-content">
            <h3 class="text-cyan-400 text-sm font-bold mb-4">AI DUBBING</h3>
            <textarea id="dub-input" class="w-full bg-black border border-zinc-800 p-3 rounded text-xs h-24 text-white mb-4" placeholder="Enter dialogue..."></textarea>
            <button onclick="processDub()" class="w-full bg-white text-black py-2 rounded text-xs font-bold">GENERATE VOICE</button>
            <button onclick="this.parentElement.parentElement.style.display='none'" class="w-full mt-2 text-gray-500 text-[10px]">CANCEL</button>
        </div>
    </div>

    <script>
        setTimeout(() => {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
        }, 2000);

        const video = document.getElementById('main-video');
        const vClip = document.getElementById('v-clip');
        const scroll = document.getElementById('timeline-scroll');
        const timeVal = document.getElementById('time-val');
        const playIcon = document.getElementById('play-icon');

        function handleUpload(input) {
            if(input.files[0]) {
                video.src = URL.createObjectURL(input.files[0]);
                document.getElementById('upload-hint').style.display = 'none';
                video.onloadedmetadata = () => {
                    vClip.style.display = 'block';
                    vClip.style.width = (video.duration * 50) + "px";
                    updateUI();
                };
            }
        }

        function togglePlay() {
            if(video.paused) { video.play(); playIcon.className = 'fa-solid fa-pause'; }
            else { video.pause(); playIcon.className = 'fa-solid fa-play'; }
        }

        video.ontimeupdate = () => {
            if(!video.paused) {
                scroll.scrollLeft = video.currentTime * 50;
                updateUI();
            }
        };

        function syncTimeline() {
            if(video.paused && video.src) {
                video.currentTime = scroll.scrollLeft / 50;
                updateUI();
            }
        }

        function updateUI() {
            const cur = Math.floor(video.currentTime);
            const dur = Math.floor(video.duration || 0);
            timeVal.innerText = `00:${cur < 10 ? '0'+cur : cur} / 00:${dur < 10 ? '0'+dur : dur}`;
        }

        // --- টেক্সট ফিচার (New) ---
        function addText() {
            const txt = prompt("Enter text:");
            if(!txt) return;
            const el = document.createElement('div');
            el.className = 'text-layer';
            el.innerText = txt;
            el.style.left = '50%';
            el.style.top = '50%';
            
            // ড্র্যাগিং লজিক
            let isDragging = false;
            el.onmousedown = (e) => { 
                isDragging = true; 
                document.querySelectorAll('.text-layer').forEach(t => t.classList.remove('active'));
                el.classList.add('active');
            };
            window.onmousemove = (e) => {
                if(isDragging) {
                    el.style.left = e.clientX - el.offsetWidth/2 + 'px';
                    el.style.top = e.clientY - el.offsetHeight/2 + 'px';
                }
            };
            window.onmouseup = () => isDragging = false;
            
            document.getElementById('text-container').appendChild(el);
            closeMenu();
        }

        // --- এডিটিং ফিচারস ---
        function splitVideo() {
            alert("Video split at " + video.currentTime.toFixed(2) + "s");
            // ভিজ্যুয়ালি ক্লিপে একটা বর্ডার দেওয়া
            vClip.style.borderRight = "4px solid red";
            setTimeout(() => vClip.style.borderRight = "1.5px solid #444", 1000);
        }

        function setSpeed(s) { video.playbackRate = s; closeMenu(); }
        function setFilter(f) { video.style.filter = f; }
        function openMenu(id) { document.getElementById(id).style.display = 'flex'; }
        function closeMenu() { document.querySelectorAll('.sub-menu').forEach(m => m.style.display = 'none'); }
        function openDubbing() { document.getElementById('dub-modal').style.display = 'flex'; }
        
        function processDub() {
            const btn = event.target;
            btn.innerText = "PROCESSING...";
            setTimeout(() => {
                alert("AI Voice generated and added to timeline!");
                btn.innerText = "GENERATE VOICE";
                document.getElementById('dub-modal').style.display = 'none';
            }, 2000);
        }

        function runExport() {
            alert("Exporting project... Your video is being processed.");
        }
    </script>
</body>
</html>
