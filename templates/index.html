<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master Pro | Cosmic Editor by Shakil</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;900&family=Poppins:wght@700;900&display=swap');
        
        :root {
            --bg: #000000;
            --aurora-1: #00f5ff;
            --aurora-2: #bd00ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body { background-color: var(--bg); color: #ffffff; font-family: 'Montserrat', sans-serif; overflow: hidden; perspective: 1000px; margin: 0; }

        /* --- COSMIC INTRO ANIMATION (আপনার সেই অরিজিনাল ডিজাইন) --- */
        #intro-overlay {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .shakil-title {
            font-size: 6rem; font-weight: 900; font-family: 'Poppins', sans-serif;
            text-transform: uppercase; letter-spacing: -5px;
            background: linear-gradient(135deg, #fff 30%, var(--aurora-1), var(--aurora-2), #fff 70%);
            background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: aurora-text 5s infinite linear; filter: drop-shadow(0 0 20px rgba(0,245,255,0.4));
        }

        @keyframes aurora-text { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .cosmic-ring { position: absolute; width: 300px; height: 300px; border-radius: 50%; border: 2px solid var(--aurora-1); opacity: 0; transform: scale(0) rotateX(70deg); }

        .glass-panel { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 30px; }
        .aurora-btn { background: linear-gradient(135deg, var(--aurora-1), var(--aurora-2)); color: #000; font-weight: 900; padding: 12px 30px; border-radius: 50px; text-transform: uppercase; font-size: 11px; }

        .timeline-box { height: 250px; background: #050505; border-radius: 40px 40px 0 0; border-top: 1px solid #1a1a1a; }
        .track { height: 48px; background: rgba(255,255,255,0.01); margin: 8px 0; border-radius: 10px; position: relative; min-width: 5000px; }
        .clip { position: absolute; height: 38px; top: 5px; border-radius: 8px; background: linear-gradient(90deg, var(--aurora-1), #0072ff); color: #000; font-size: 10px; font-weight: 800; padding: 0 15px; display: flex; align-items: center; }
        .playhead { position: absolute; top: 0; bottom: 0; width: 3px; background: #ff3344; z-index: 100; box-shadow: 0 0 15px #ff3344; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="intro-overlay">
        <div class="cosmic-ring" id="ring-1"></div>
        <div class="cosmic-ring" id="ring-2" style="border-color: var(--aurora-2);"></div>
        <div class="text-center animate__animated animate__zoomIn animate__slow">
            <p class="text-zinc-600 font-light uppercase tracking-[15px] text-[10px] mb-2">Designed for</p>
            <h1 class="shakil-title">SHAKIL</h1>
            <div class="mt-12 flex items-center justify-center gap-3 animate__animated animate__fadeInUp animate__delay-2s">
                <div class="h-px w-10 bg-zinc-800"></div>
                <span class="text-cyan-400 font-bold tracking-[8px] text-xs uppercase">AI MASTER PRO</span>
                <div class="h-px w-10 bg-zinc-800"></div>
            </div>
        </div>
    </div>

    <div id="main-app" class="flex-1 flex flex-col opacity-0 scale-90 blur-xl">
        <header class="h-16 glass-panel m-2 px-6 flex items-center justify-between z-50">
            <h1 class="text-lg font-black uppercase">AI Master <span class="text-cyan-400">Pro</span></h1>
            <button onclick="openDub()" class="aurora-btn">Auto Dubbing</button>
        </header>

        <div class="flex flex-1 overflow-hidden px-2">
            <aside class="w-72 glass-panel m-1 p-5 flex flex-col">
                <button onclick="document.getElementById('file-in').click()" class="w-full py-10 border-2 border-dashed border-zinc-800 rounded-3xl hover:border-cyan-500 transition">
                    <i class="fa-solid fa-plus text-zinc-700"></i>
                    <span class="text-[10px] mt-2 text-zinc-600">Import Files</span>
                </button>
                <input type="file" id="file-in" class="hidden" multiple onchange="handleUpload(this)">
                <div id="media-list" class="mt-6 space-y-3 flex-1 overflow-y-auto pr-1"></div>
            </aside>

            <main class="flex-1 flex flex-col m-1">
                <div class="flex-1 glass-panel relative flex items-center justify-center overflow-hidden">
                    <video id="v-player" class="w-full h-full object-contain rounded-2xl"></video>
                    <button onclick="toggle()" class="absolute w-16 h-16 bg-white text-black rounded-full flex items-center justify-center text-2xl shadow-2xl"><i id="p-ico" class="fa-solid fa-play"></i></button>
                </div>

                <div class="timeline-box mt-2 p-6 overflow-hidden relative">
                    <span id="timer" class="text-3xl font-black text-white/90">00:00:00</span>
                    <div class="relative overflow-x-auto h-24 mt-4" id="tl-scroll">
                        <div id="playhead" class="playhead"></div>
                        <div id="v-track" class="track"></div>
                        <div id="a-track" class="track"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const video = document.getElementById('v-player');
        const playIco = document.getElementById('p-ico');
        const playhead = document.getElementById('playhead');

        // GSAP Intro Logic
        window.addEventListener('load', () => {
            const tl = gsap.timeline();
            tl.to("#ring-1", { duration: 1.5, opacity: 0.5, scale: 2.5, ease: "power4.out" })
              .to("#ring-2", { duration: 1.5, opacity: 0.3, scale: 3, ease: "power4.out" }, "-=1")
              .to("#intro-overlay", { duration: 1.2, y: "-100%", ease: "expo.inOut", delay: 0.5 })
              .to("#main-app", { duration: 1, opacity: 1, scale: 1, blur: 0, ease: "power4.out" }, "-=0.8");
        });

        function toggle() {
            if (video.paused) { video.play(); playIco.className = 'fa-solid fa-pause'; }
            else { video.pause(); playIco.className = 'fa-solid fa-play'; }
        }

        async function handleUpload(input) {
            const fd = new FormData();
            for(let f of input.files) fd.append('files', f);
            // ব্যাকএন্ডে '/upload' রাউটে ডাটা পাঠাবে
            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            
            data.files.forEach(f => {
                document.getElementById('media-list').innerHTML += `
                    <div onclick="playVid('${f.url}', '${f.original_name}')" class="glass-panel p-3 border border-white/5 hover:border-cyan-500 cursor-pointer flex gap-3 items-center mb-2">
                        <p class="text-[9px] truncate font-bold text-zinc-400">${f.original_name}</p>
                    </div>`;
            });
        }

        function playVid(url, name) {
            video.src = url;
            document.getElementById('v-track').innerHTML = `<div class="clip w-[1500px]">${name}</div>`;
            video.play();
            playIco.className = 'fa-solid fa-pause';
        }

        video.ontimeupdate = () => {
            const t = video.currentTime;
            document.getElementById('timer').innerText = Math.floor(t) + "s / " + Math.floor(video.duration || 0) + "s";
            playhead.style.left = (t * 40) + "px";
        };
    </script>
</body>
</html>
