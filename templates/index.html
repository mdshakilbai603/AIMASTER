<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CapCut Pro | Shakil Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;900&family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap');
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* --- YOUR ORIGINAL GSAP COSMIC INTRO --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .intro-name {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 12px;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(to right, #fff 10%, #00f5ff, #bd00ff, #fff 90%);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aurora-glow 6s infinite linear;
        }

        @keyframes aurora-glow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        .ring { position: absolute; width: 300px; height: 300px; border-radius: 50%; border: 1.5px solid #00f5ff; opacity: 0; }

        /* --- REAL CAPCUT MOBILE UI LAYOUT --- */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            opacity: 0;
        }

        /* 1. Header (Resolution & Export) */
        header {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            background: #000;
            border-bottom: 1px solid #1a1a1a;
            z-index: 100;
        }
        
        .header-icon { font-size: 18px; color: #aaa; cursor: pointer; }
        
        .res-badge {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ddd;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 50px;
            letter-spacing: 1.5px;
        }

        .export-btn {
            background: #0080ff;
            color: #fff;
            font-size: 11px;
            font-weight: 900;
            padding: 5px 18px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        /* 2. Video Preview (Mobile Scale) */
        .preview-window {
            flex: 1;
            background: #080808;
            display: flex;
            items-center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid #1a1a1a;
        }
        
        video { max-width: 100%; max-height: 100%; object-fit: contain; }
        .play-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; text-shadow: 0 0 10px #000; }

        /* 3. Timeline Area (The Real Deal) */
        .timeline-container {
            height: 260px;
            background: #111;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .time-labels {
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            color: #777;
            font-size: 10px;
            font-family: monospace;
            border-bottom: 1px solid #1a1a1a;
        }

        .playhead-center {
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 2px; background: #fff;
            z-index: 100; pointer-events: none;
            box-shadow: 0 0 10px #fff;
        }

        .tracks-scroll {
            flex: 1;
            overflow-x: auto;
            position: relative;
            padding: 15px 0;
            min-width: 10000px; /* Long time scale */
        }

        .track-row {
            height: 48px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.01);
            position: relative;
        }

        .v-clip {
            position: absolute;
            height: 40px; top: 4px;
            background: #2a2a2a; border: 1.5px solid #444;
            border-radius: 4px; display: flex; align-items: center;
            padding: 0 10px; font-size: 10px; color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .a-clip { background: #3c1e55; border-color: #5d2b7d; }

        /* 4. Bottom Toolbar (App Icons) */
        .bottom-toolbar {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: #000;
            border-top: 1px solid #1a1a1a;
        }

        .tool-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #888;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .tool-item i { font-size: 19px; }
        .tool-item span { font-size: 9px; font-weight: bold; }
        .tool-item:hover { color: #fff; transform: scale(1.05); }
        .tool-item.active { color: #fff; }

        /* Add Media Overlay (Airtel style glitzy button) */
        .add-media-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #00f5ff, #bd00ff);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0,245,255,0.3);
            cursor: pointer;
            z-index: 110;
        }

        /* --- AI DUBBING MENU (When clicked) --- */
        #dubbing-menu {
            display: none;
            position: fixed;
            left: 0; right: 0; bottom: 0;
            height: 180px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            border-top: 2px solid #333;
            flex-direction: column;
            padding: 20px;
        }
        #dub-btn {
            background: #fff; color: #000; font-weight: 900; padding: 10px; border-radius: 50px; text-transform: uppercase; font-size: 11px;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="intro-overlay">
        <div class="ring" id="ring-1"></div>
        <div class="ring" id="ring-2" style="border-color: #bd00ff; width: 220px; height: 220px;"></div>
        <h1 class="intro-name">SHAKIL</h1>
    </div>

    <div id="app">
        <header>
            <i class="fa-solid fa-chevron-left header-icon"></i>
            <span class="res-badge">1080P</span>
            <button class="export-btn">EXPORT</button>
        </header>

        <div class="preview-window">
            <video id="v-player" src="" playsinline></video>
            <div class="play-btn" onclick="togglePlay()"><i id="play-ico" class="fa-solid fa-play"></i></div>
            
            <div class="add-media-btn" onclick="document.getElementById('file-in').click()">
                <i class="fa-solid fa-plus text-xl text-black"></i>
            </div>
            <input type="file" id="file-in" class="hidden" multiple onchange="uploadMedia(this)">
        </div>

        <div class="timeline-container">
            <div class="time-labels">
                <span id="currentTime">00:00</span>
                <i class="fa-solid fa-sync text-zinc-600"></i>
            </div>
            
            <div class="playhead-center"></div>
            
            <div class="tracks-scroll" id="tl-scroll">
                <div class="track-row" id="v-track">
                    </div>
                <div class="track-row" id="a-track">
                    </div>
            </div>
        </div>

        <div class="bottom-toolbar">
            <div class="tool-item active">
                <i class="fa-solid fa-scissors"></i>
                <span>EDIT</span>
            </div>
            <div class="tool-item">
                <i class="fa-solid fa-font"></i>
                <span>TEXT</span>
            </div>
            <div class="tool-item" onclick="toggleDubbingMenu()">
                <i class="fa-solid fa-microphone-lines"></i>
                <span>DUBBING</span>
            </div>
            <div class="tool-item">
                <i class="fa-solid fa-magic text-cyan-400"></i>
                <span>EFFECTS</span>
            </div>
            <div class="tool-item">
                <i class="fa-solid fa-adjust"></i>
                <span>FILTER</span>
            </div>
        </div>
    </div>

    <div id="dubbing-menu">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-sm font-black text-cyan-400 uppercase tracking-widest">AI VOICE OVER</h3>
            <i class="fa-solid fa-times-circle text-zinc-600 text-lg" onclick="toggleDubbingMenu()"></i>
        </div>
        <textarea id="dub-text" class="flex-1 bg-white/5 border border-zinc-800 p-4 rounded-xl text-xs mb-3 focus:border-cyan-500 outline-none text-white h-20" placeholder="সংলাপটি এখানে দিন..."></textarea>
        <button onclick="generateDub()" id="dub-btn">Sync Final Audio</button>
    </div>

    <script>
        const video = document.getElementById('v-player');
        const playIco = document.getElementById('p-ico');
        const tlScroll = document.getElementById('tl-scroll');
        const timeDisplay = document.getElementById('currentTime');

        // GSAP Intro Logic (আপনার পছন্দের সেই অ্যানিমেশন)
        window.onload = () => {
            gsap.to("#app", { duration: 1.2, opacity: 1, delay: 2, ease: "power2.out" });
            gsap.to("#intro-overlay", { duration: 1.5, y: "-100%", delay: 1.8, ease: "expo.inOut" });
            gsap.from("#currentTime", { duration: 1, text: "00:00", delay: 3 });
        };

        function togglePlay() {
            if(!video.src) return;
            video.paused ? (video.play(), playIco.className='fa-solid fa-pause') : (video.pause(), playIco.className='fa-solid fa-play');
        }

        async function uploadMedia(input) {
            const fd = new FormData();
            fd.append('files', input.files[0]);
            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            
            video.src = data.files[0].url;
            
            // টাইমলাইনে ভিডিও ক্লিপ যোগ করা
            document.getElementById('v-track').innerHTML = `
                <div class="v-clip" style="left: 50%; width: 1500px">
                    ${input.files[0].name}
                </div>`;
            
            video.play();
            playIco.className='fa-solid fa-pause';
        }

        // টাইমলাইন স্ক্রল সিঙ্ক (১০৮০পি বাটন ঠিক জায়গায় রেখেই)
        video.ontimeupdate = () => {
            const t = video.currentTime;
            const minutes = Math.floor(t / 60).toString().padStart(2, '0');
            const seconds = Math.floor(t % 60).toString().padStart(2, '0');
            timeDisplay.innerText = `${minutes}:${seconds}`;
            
            // প্লে-হেড ঠিক রাখতে টাইমলাইন স্ক্রল করা
            tlScroll.scrollLeft = t * 40; // ১ সেকেন্ড = ৪০ পিক্সেল
        };

        function toggleDubbingMenu() {
            const menu = document.getElementById('dubbing-menu');
            if(menu.style.display === 'flex') menu.style.display = 'none';
            else menu.style.display = 'flex';
        }

        async function generateDub() {
            const text = document.getElementById('dub-text').value;
            const btn = document.getElementById('dub-btn');
            if(!text) return;
            btn.innerText = "Syncing with video...";
            const res = await fetch('/api/generate-dub', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text })
            });
            const data = await res.json();
            new Audio(data.audio_url).play();
            
            // ডাবিং ক্লিপ যোগ করা
            document.getElementById('a-track').innerHTML += `<div class="v-clip a-clip" style="left:${video.currentTime*40 + 400}px">AI SYNC VOICE</div>`;
            
            btn.innerText = "Sync Final Audio";
            toggleDubbingMenu();
        }
    </script>
</body>
</html>
