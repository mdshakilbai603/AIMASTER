<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master Pro | Designed for Shakil</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --primary: #00f5ff;
            --bg: #030303;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        /* --- PRE-LOADER / INTRO --- */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loader-text {
            font-size: 5vw;
            font-weight: 800;
            letter-spacing: -2px;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.2);
            position: relative;
        }

        .loader-text::after {
            content: attr(data-text);
            position: absolute;
            left: 0; top: 0;
            color: var(--primary);
            width: 0%;
            overflow: hidden;
            transition: 2s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
        }

        /* --- GLASS UI --- */
        .glass {
            background: var(--surface);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
            font-weight: 700;
            transition: all 0.4s;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(0, 245, 255, 0.5);
        }

        /* --- TIMELINE --- */
        .timeline-container {
            height: 220px;
            background: #080808;
            border-top: 1px solid var(--border);
        }

        .track {
            height: 40px;
            background: rgba(255,255,255,0.02);
            margin: 10px 0;
            border-radius: 12px;
            position: relative;
            min-width: 3000px;
        }

        .playhead {
            position: absolute;
            top: 0; bottom: 0;
            width: 2px;
            background: #ff3b30;
            z-index: 10;
            box-shadow: 0 0 15px #ff3b30;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .sidebar-item {
            transition: 0.3s;
            border-radius: 15px;
        }
        .sidebar-item:hover { background: rgba(255,255,255,0.08); }
    </style>
</head>
<body>

    <div id="loader">
        <h1 class="loader-text" data-text="SHAKIL" id="shakil-name">SHAKIL</h1>
        <p id="sub-text" class="opacity-0 tracking-[10px] text-[10px] mt-4 text-zinc-500 font-bold uppercase">AI Master Pro Engine</p>
    </div>

    <div id="app" class="h-screen flex flex-col invisible">
        
        <header class="h-16 px-8 flex items-center justify-between border-b border-white/5 bg-black/40">
            <div class="flex items-center gap-4">
                <div class="w-8 h-8 rounded-full bg-cyan-400 blur-[2px] animate-pulse"></div>
                <h1 class="font-extrabold text-xl tracking-tighter uppercase">AI Master <span class="text-cyan-400">Pro</span></h1>
            </div>

            <div class="flex items-center gap-6">
                <div class="flex gap-2">
                    <button onclick="openDub()" class="glass px-6 py-2 rounded-full text-xs font-bold hover:bg-white hover:text-black transition">DUBBING</button>
                    <button class="btn-primary px-6 py-2 rounded-full text-xs">EXPORT</button>
                </div>
                <div class="w-10 h-10 rounded-full bg-zinc-800 border border-white/10 flex items-center justify-center">
                    <i class="fa-solid fa-user text-xs"></i>
                </div>
            </div>
        </header>

        <main class="flex-1 flex overflow-hidden">
            <aside class="w-20 border-r border-white/5 flex flex-col items-center py-6 gap-8">
                <button class="sidebar-item w-12 h-12 flex items-center justify-center text-zinc-500 hover:text-cyan-400">
                    <i class="fa-solid fa-folder-open text-xl"></i>
                </button>
                <button class="sidebar-item w-12 h-12 flex items-center justify-center text-zinc-500 hover:text-cyan-400">
                    <i class="fa-solid fa-scissors text-xl"></i>
                </button>
                <button class="sidebar-item w-12 h-12 flex items-center justify-center text-zinc-500 hover:text-cyan-400">
                    <i class="fa-solid fa-wand-magic-sparkles text-xl"></i>
                </button>
            </aside>

            <section class="flex-1 flex flex-col p-4 bg-[#050505]">
                <div class="flex-1 glass rounded-[40px] relative overflow-hidden flex items-center justify-center shadow-inner">
                    <video id="v-player" class="max-w-full max-h-full rounded-2xl"></video>
                    
                    <div class="absolute bottom-10 flex items-center gap-12 bg-black/20 backdrop-blur-md px-10 py-5 rounded-full border border-white/5 opacity-0 hover:opacity-100 transition-all duration-500">
                        <button class="text-zinc-400 hover:text-white"><i class="fa-solid fa-backward-step"></i></button>
                        <button onclick="toggle()" class="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center text-xl shadow-xl">
                            <i id="play-btn" class="fa-solid fa-play"></i>
                        </button>
                        <button class="text-zinc-400 hover:text-white"><i class="fa-solid fa-forward-step"></i></button>
                    </div>
                </div>

                <div class="timeline-container mt-4 rounded-[32px] p-6 overflow-hidden">
                    <div class="flex items-center justify-between mb-4">
                        <span id="timestamp" class="text-3xl font-bold font-mono text-cyan-400 tracking-tighter">00:00:00</span>
                        <div class="flex gap-2">
                             <button onclick="document.getElementById('f-in').click()" class="bg-zinc-900 px-4 py-2 rounded-xl text-[10px] font-bold border border-white/5 hover:bg-zinc-800 transition uppercase tracking-widest">
                                <i class="fa-solid fa-plus mr-2"></i> Add Clip
                             </button>
                             <input type="file" id="f-in" class="hidden" multiple onchange="handleUpload(this)">
                        </div>
                    </div>
                    
                    <div class="relative overflow-x-auto h-24" id="timeline-scroll">
                        <div id="playhead" class="playhead"></div>
                        <div id="v-track" class="track"></div>
                        <div id="a-track" class="track"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="dub-modal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6 backdrop-blur-3xl">
        <div class="w-full max-w-xl glass p-12 rounded-[50px] border-white/10">
            <h2 class="text-4xl font-extrabold mb-2 tracking-tighter">AI Voice <span class="text-cyan-400">Sync</span></h2>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[6px] mb-10">Professional Drama & Movie Dubbing</p>

            <textarea id="dub-txt" class="w-full bg-white/5 border border-white/10 p-6 rounded-3xl outline-none focus:border-cyan-400 transition h-40 text-sm mb-8" placeholder="এখানে আপনার সংলাপটি লিখুন..."></textarea>
            
            <div class="grid grid-cols-2 gap-6 mb-10">
                <label class="cursor-pointer group">
                    <input type="radio" name="v" value="male" class="hidden peer">
                    <div class="p-6 rounded-3xl bg-zinc-900 border border-white/5 peer-checked:bg-white peer-checked:text-black transition flex flex-col items-center">
                        <i class="fa-solid fa-mars text-2xl mb-2"></i>
                        <span class="text-xs font-bold uppercase">Actor</span>
                    </div>
                </label>
                <label class="cursor-pointer group">
                    <input type="radio" name="v" value="female" checked class="hidden peer">
                    <div class="p-6 rounded-3xl bg-zinc-900 border border-white/5 peer-checked:bg-white peer-checked:text-black transition flex flex-col items-center">
                        <i class="fa-solid fa-venus text-2xl mb-2"></i>
                        <span class="text-xs font-bold uppercase">Actress</span>
                    </div>
                </label>
            </div>

            <div class="flex gap-6">
                <button onclick="closeDub()" class="flex-1 py-5 text-zinc-500 font-bold uppercase text-xs">Close</button>
                <button id="gen-btn" onclick="process()" class="flex-[2] btn-primary py-5 rounded-3xl text-xs uppercase tracking-widest">Generate & Lip-Sync</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('v-player');
        const playBtn = document.getElementById('play-btn');
        const playhead = document.getElementById('playhead');

        // Cinematic GSAP Intro Animation
        window.addEventListener('load', () => {
            const tl = gsap.timeline();
            
            tl.to(".loader-text", { duration: 1, opacity: 1 })
              .to("#shakil-name", { "--width": "100%", duration: 1.5, ease: "power4.inOut" }, "+=0.2")
              .to("#sub-text", { opacity: 1, y: -10, duration: 1 }, "-=0.5")
              .to("#loader", { y: "-100%", duration: 1.2, ease: "expo.inOut", delay: 1 })
              .to("#app", { visibility: "visible", opacity: 1, duration: 0.5 }, "-=0.5");
            
            // Text fill animation trigger
            document.getElementById('shakil-name').style.width = "auto";
            setTimeout(() => {
                document.querySelector('.loader-text').classList.add('active');
            }, 500);
        });

        // Add custom style for loader text
        const style = document.createElement('style');
        style.textContent = `
            .loader-text.active::after { width: 100%; }
        `;
        document.head.appendChild(style);

        function toggle() {
            if (video.paused) { video.play(); playBtn.className = 'fa-solid fa-pause'; }
            else { video.pause(); playBtn.className = 'fa-solid fa-play'; }
        }

        async function handleUpload(input) {
            const fd = new FormData();
            for(let f of input.files) fd.append('files', f);
            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            
            video.src = URL.createObjectURL(input.files[0]);
            document.getElementById('v-track').innerHTML = `<div class="absolute h-full bg-cyan-500/20 border-x border-cyan-400 w-[1200px] flex items-center px-4 text-[10px] font-bold">${input.files[0].name}</div>`;
            video.play();
        }

        function openDub() { document.getElementById('dub-modal').classList.remove('hidden'); }
        function closeDub() { document.getElementById('dub-modal').classList.add('hidden'); }

        async function process() {
            const btn = document.getElementById('gen-btn');
            btn.innerText = "AI Processing...";
            // Backend API call logic goes here...
            setTimeout(() => {
                btn.innerText = "Sync Complete";
                setTimeout(closeDub, 1000);
            }, 2000);
        }

        video.ontimeupdate = () => {
            const t = video.currentTime;
            document.getElementById('timestamp').innerText = t.toFixed(2).padStart(5, '0');
            playhead.style.left = (t * 50) + "px";
        };
    </script>
</body>
</html>
