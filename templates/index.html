<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Master Pro | Full Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@400;700&display=swap');
        
        html, body { margin: 0; padding: 0; height: 100dvh; background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; user-select: none; }
        
        /* --- ইন্ট্রো --- */
        #intro { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .shakil-text { font-family: 'Montserrat', sans-serif; font-size: 4rem; font-weight: 900; background: linear-gradient(90deg, #fff, #00f5ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 30px rgba(0,245,255,0.5); }
        
        /* --- মেইন এডিটর --- */
        .editor-container { display: grid; grid-template-rows: auto 1fr auto; height: 100dvh; }
        .preview-area { background: #0a0a0a; display: flex; align-items: center; justify-content: center; position: relative; }
        video { max-width: 100%; max-height: 100%; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        
        /* --- টাইমলাইন --- */
        .timeline { background: #111; height: 180px; border-top: 1px solid #222; position: relative; overflow-x: auto; }
        .v-clip { position: absolute; top: 50px; left: 100px; height: 50px; background: rgba(0, 245, 255, 0.2); border: 1px solid #00f5ff; border-radius: 8px; display: none; align-items: center; padding: 0 15px; font-size: 10px; font-weight: bold; }

        /* --- বটম টুলস --- */
        .bottom-tools { background: #000; height: 80px; display: flex; align-items: center; padding: 0 20px; gap: 25px; border-top: 1px solid #1a1a1a; overflow-x: auto; }
        .tool-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 60px; color: #666; transition: 0.3s; cursor: pointer; }
        .tool-btn:hover { color: #00f5ff; }
        .tool-btn i { font-size: 1.2rem; }
        .tool-btn span { font-size: 10px; font-weight: bold; text-transform: uppercase; }

        /* মডাল */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="shakil-text">SHAKIL</div>
        <div class="text-cyan-400 font-bold tracking-[10px] text-[10px] mt-2">AI MASTER PRO</div>
    </div>

    <div class="editor-container">
        <div class="p-4 flex justify-between items-center bg-black">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-circle text-[8px] text-red-500 animate-pulse"></i>
                <span class="text-[10px] font-bold tracking-[3px]">ENGINE LIVE</span>
            </div>
            <button onclick="openExport()" class="bg-white text-black px-6 py-1.5 rounded-full font-black text-[10px] hover:bg-cyan-400 transition">EXPORT</button>
        </div>

        <div class="preview-area">
            <video id="main-video" controls style="display:none;"></video>
            <div id="add-text" onclick="document.getElementById('file-input').click()" class="flex flex-col items-center gap-4 cursor-pointer">
                <i class="fa-solid fa-square-plus text-5xl text-gray-800"></i>
                <p class="text-gray-600 text-[10px] font-bold tracking-[5px]">ADD NEW PROJECT</p>
            </div>
            <input type="file" id="file-input" class="hidden" accept="video/*" onchange="loadVideo(this)">
        </div>

        <div>
            <div class="timeline">
                <div id="v-clip" class="v-clip">
                    <i class="fa-solid fa-video mr-2"></i> VIDEO_LAYER_01.mp4
                </div>
                <div class="absolute left-1/2 top-0 bottom-0 w-[1px] bg-cyan-500 shadow-[0_0_10px_#00f5ff]"></div>
            </div>
            <div class="bottom-tools">
                <div class="tool-item tool-btn" onclick="document.getElementById('file-input').click()">
                    <i class="fa-solid fa-scissors"></i><span>এডিট</span>
                </div>
                <div class="tool-item tool-btn" onclick="openDubbing()">
                    <i class="fa-solid fa-microphone-lines"></i><span>ডাবিং</span>
                </div>
                <div class="tool-item tool-btn">
                    <i class="fa-solid fa-font"></i><span>টেক্সট</span>
                </div>
                <div class="tool-item tool-btn">
                    <i class="fa-solid fa-wand-magic-sparkles"></i><span>ইফেক্ট</span>
                </div>
            </div>
        </div>
    </div>

    <div id="dub-modal" class="modal">
        <div class="bg-[#111] p-8 rounded-3xl w-full max-w-sm border border-cyan-900/30">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i class="fa-solid fa-robot text-cyan-400"></i> AI Dubbing
            </h2>
            <select id="lang" class="w-full bg-[#1a1a1a] border border-[#333] p-4 rounded-2xl mb-4 text-sm focus:outline-none">
                <option value="bn">Bengali</option>
                <option value="en">English</option>
                <option value="hi">Hindi</option>
            </select>
            <button id="dub-btn" onclick="processDubbing()" class="w-full bg-cyan-500 text-black font-black py-4 rounded-2xl hover:bg-cyan-400 transition">Generate Voice</button>
            <button onclick="closeDubbing()" class="w-full mt-4 text-gray-500 text-xs font-bold">CANCEL</button>
        </div>
    </div>

    <div id="export-modal" class="modal">
        <div class="bg-[#111] p-10 rounded-3xl w-full max-w-sm text-center">
            <div class="loader-ring mb-6"></div>
            <h2 class="text-lg font-bold mb-2">Exporting...</h2>
            <div class="w-full bg-gray-900 h-1 rounded-full overflow-hidden mb-4">
                <div id="export-bar" class="bg-cyan-500 h-full w-0 transition-all"></div>
            </div>
            <p id="export-percent" class="text-cyan-400 font-bold text-xs">0%</p>
        </div>
    </div>

    <script>
        // ইন্ট্রো হ্যান্ডলার
        setTimeout(() => {
            const intro = document.getElementById('intro');
            intro.style.opacity = '0';
            setTimeout(() => intro.remove(), 500);
        }, 2000);

        const video = document.getElementById('main-video');

        // --- ভিডিও আপলোড এবং সার্ভার কল (আপনার ফাইলের সাথে যুক্ত করা হলো) ---
        async function loadVideo(input) {
            const file = input.files[0];
            if (!file) return;

            // UI আপডেট
            document.getElementById('add-text').style.display = 'none';
            const clip = document.getElementById('v-clip');
            
            let formData = new FormData();
            formData.append("file", file);

            try {
                // আপনার Render এপিআই কল
                const response = await fetch('/api/process', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if(data.status === 'success') {
                    video.src = data.url;
                    video.style.display = 'block';
                    clip.style.display = 'flex';
                    video.play();
                } else {
                    alert("Error: " + data.error);
                }
            } catch (err) {
                alert("সার্ভার কানেক্ট হচ্ছে না! app.py চালু আছে তো?");
            }
        }

        // --- ডাবিং কন্ট্রোল ---
        function openDubbing() {
            if(!video.src) return alert("আগে ভিডিও যোগ করুন!");
            document.getElementById('dub-modal').style.display = 'flex';
        }

        function closeDubbing() {
            document.getElementById('dub-modal').style.display = 'none';
        }
        
        async function processDubbing() {
            const btn = document.getElementById('dub-btn');
            btn.innerText = "Generating AI Voice...";
            btn.disabled = true;

            // এখানে ভবিষ্যতে ডাবিং এপিআই হিট হবে
            setTimeout(() => {
                alert("আপনার AI ভয়েস রিকোয়েস্ট সফল হয়েছে!");
                btn.innerText = "Generate Voice";
                btn.disabled = false;
                closeDubbing();
            }, 2000);
        }

        // --- এক্সপোর্ট ফাংশন ---
        function openExport() {
            if(!video.src) return alert("প্রথমে ভিডিও যোগ করুন!");
            document.getElementById('export-modal').style.display = 'flex';
            let progress = 0;
            let bar = document.getElementById('export-bar');
            let text = document.getElementById('export-percent');
            
            let interval = setInterval(() => {
                progress += Math.floor(Math.random() * 5) + 1;
                if(progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        alert("ভিডিও সফলভাবে সেভ হয়েছে!");
                        document.getElementById('export-modal').style.display = 'none';
                    }, 500);
                }
                bar.style.width = progress + "%";
                text.innerText = progress + "%";
            }, 100);
        }
    </script>
</body>
</html>
