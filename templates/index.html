<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAKIL | THE NEXT GEN EDITOR</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@200;900&display=swap');
        
        :root {
            --accent: #00f5ff;
            --purple: #bd00ff;
            --bg: #030303;
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Outfit', sans-serif; 
            overflow: hidden; 
            margin: 0;
        }

        /* --- YOUR ORIGINAL COSMIC INTRO --- */
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .shakil-brand {
            font-family: 'Syncopate', sans-serif; font-size: 5rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 15px;
            background: linear-gradient(135deg, #fff, var(--accent), var(--purple), #fff);
            background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: aurora 6s infinite linear;
        }

        @keyframes aurora { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        .ring { position: absolute; width: 300px; height: 300px; border-radius: 50%; border: 1px solid var(--accent); opacity: 0; }

        /* --- NEW UNIQUE NEUMORPHIC CYBER UI --- */
        .glass-island {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px);
            border-radius: 35px;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.01);
        }

        .main-container { padding: 25px; height: 100vh; display: flex; flex-direction: column; opacity: 0; }

        /* Modern Video Stage */
        .video-box {
            background: #000; border-radius: 40px; overflow: hidden;
            position: relative; border: 1px solid rgba(255,255,255,0.03);
        }

        .control-pill {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 40px; border-radius: 100px;
        }

        /* Unique Vertical Sidebar */
        .side-nav {
            width: 80px; display: flex; flex-direction: column; gap: 20px;
            align-items: center; padding: 20px 0;
        }

        .nav-icon {
            width: 50px; height: 50px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .nav-icon:hover { background: var(--accent); color: #000; transform: scale(1.1); }

        /* Floating Timeline */
        .modern-timeline {
            height: 180px; margin-top: 20px; position: relative;
            background: rgba(255,255,255,0.01); border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.02); overflow: hidden;
        }

        .cursor-line {
            position: absolute; top: 0; bottom: 0; width: 2px;
            background: #fff; z-index: 100; box-shadow: 0 0 20px var(--accent);
        }

        .track-lane {
            height: 50px; margin: 15px 25px;
            background: rgba(255,255,255,0.01); border-radius: 15px;
            position: relative; min-width: 5000px;
        }

        .clip-neon {
            position: absolute; height: 40px; top: 5px;
            background: linear-gradient(90deg, var(--accent), var(--purple));
            border-radius: 12px; color: #000; font-size: 10px; font-weight: 900;
            display: flex; align-items: center; padding: 0 20px;
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="ring" id="r1"></div>
        <h1 class="shakil-brand" id="brand">SHAKIL</h1>
    </div>

    <div class="main-container" id="app-ui">
        <header class="h-20 flex items-center justify-between px-10 mb-5">
            <div class="flex items-center gap-5">
                <div class="w-12 h-12 glass-island flex items-center justify-center font-black text-cyan-400">S</div>
                <h2 class="text-[10px] tracking-[12px] uppercase opacity-40">Gen-Next Studio</h2>
            </div>
            <button onclick="openDub()" class="bg-white text-black px-8 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-cyan-400 transition">AI Sync Voice</button>
        </header>

        <div class="flex flex-1 gap-6 overflow-hidden">
            <nav class="side-nav glass-island">
                <div class="nav-icon" onclick="document.getElementById('f-in').click()"><i class="fa-solid fa-plus"></i></div>
                <div class="nav-icon"><i class="fa-solid fa-layer-group"></i></div>
                <div class="nav-icon"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <input type="file" id="f-in" class="hidden" multiple onchange="upload(this)">
            </nav>

            <main class="flex-1 flex flex-col gap-5">
                <div class="flex-[3] video-box flex items-center justify-center">
                    <video id="v-main" class="max-w-full max-h-full" playsinline></video>
                    <div class="absolute bottom-8 control-pill">
                        <button onclick="toggle()" class="text-2xl"><i id="p-ico" class="fa-solid fa-play"></i></button>
                    </div>
                </div>

                <div class="modern-timeline" id="tl-box" onclick="seek(event)">
                    <div id="p-head" class="cursor-line"></div>
                    <div class="pt-10">
                        <div id="v-track" class="track-lane"></div>
                        <div id="a-track" class="track-lane"></div>
                    </div>
                    <div id="time-code" class="absolute bottom-6 left-10 text-[10px] font-mono opacity-20">00:00:00</div>
                </div>
            </main>
            
            <aside class="w-80 glass-island p-8 flex flex-col gap-6">
                <h3 class="text-[10px] font-black uppercase tracking-widest opacity-30">Library</h3>
                <div id="lib" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
            </aside>
        </div>
    </div>

    <div id="dub-modal" class="hidden fixed inset-0 bg-black/95 z-[20000] flex items-center justify-center p-6">
        <div class="glass-island w-full max-w-xl p-16">
            <h3 class="text-3xl font-black mb-8 tracking-tighter uppercase">Voice Engine</h3>
            <textarea id="dub-in" class="w-full bg-white/5 border border-white/5 p-8 rounded-3xl h-56 mb-8 focus:border-cyan-400 outline-none" placeholder="সংলাপটি লিখুন..."></textarea>
            <div class="flex gap-5">
                <button onclick="closeDub()" class="text-xs font-bold opacity-30">CANCEL</button>
                <button onclick="runDub()" id="d-btn" class="flex-1 bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px]">Generate Sync</button>
            </div>
        </div>
    </div>

    <script>
        const v = document.getElementById('v-main');
        const pIco = document.getElementById('p-ico');

        // GSAP Intro
        window.onload = () => {
            const tl = gsap.timeline();
            tl.to("#r1", { duration: 1.5, opacity: 0.5, scale: 3, ease: "power4.out" })
              .to("#intro-overlay", { duration: 1.2, y: "-100%", ease: "expo.inOut", delay: 0.5 })
              .to("#app-ui", { duration: 1, opacity: 1, ease: "power2.out" }, "-=0.5");
        };

        function toggle() {
            if(!v.src) return;
            v.paused ? (v.play(), pIco.className='fa-solid fa-pause') : (v.pause(), pIco.className='fa-solid fa-play');
        }

        async function upload(input) {
            const fd = new FormData();
            for(let f of input.files) fd.append('files', f);
            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            data.files.forEach(f => {
                document.getElementById('lib').innerHTML += `
                    <div onclick="playVid('${f.url}', '${f.original_name}')" class="p-4 glass-island border border-white/5 hover:border-cyan-400 cursor-pointer text-[10px] truncate uppercase font-bold text-zinc-500">${f.original_name}</div>`;
            });
        }

        function playVid(url, name) {
            v.src = url;
            document.getElementById('v-track').innerHTML = `<div class="clip-neon w-[1000px]">${name}</div>`;
            v.play(); pIco.className='fa-solid fa-pause';
        }

        v.ontimeupdate = () => {
            const t = v.currentTime;
            document.getElementById('p-head').style.left = (t * 40 + 25) + "px";
            document.getElementById('time-code').innerText = Math.floor(t) + "s / " + Math.floor(v.duration || 0) + "s";
        };

        function seek(e) {
            const x = e.clientX - document.getElementById('tl-box').getBoundingClientRect().left + document.getElementById('tl-box').scrollLeft - 25;
            v.currentTime = x / 40;
        }

        function openDub() { document.getElementById('dub-modal').classList.remove('hidden'); }
        function closeDub() { document.getElementById('dub-modal').classList.add('hidden'); }

        async function runDub() {
            const btn = document.getElementById('d-btn');
            btn.innerText = "Syncing...";
            const res = await fetch('/api/generate-dub', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text: document.getElementById('dub-in').value })
            });
            const data = await res.json();
            new Audio(data.audio_url).play();
            document.getElementById('a-track').innerHTML += `<div class="clip-neon" style="left:${v.currentTime*40}px; background:#fff; color:#000">AI SYNC</div>`;
            btn.innerText = "Generate Sync";
            closeDub();
        }
    </script>
</body>
</html>
