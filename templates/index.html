<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master | Professional Studio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;600;800&display=swap');
        
        :root { --c: #00f5ff; --p: #bd00ff; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }

        /* --- GSAP Cosmic Intro --- */
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .ring { position: absolute; border: 2px solid var(--c); border-radius: 50%; opacity: 0; }
        .shakil-name { font-family: 'Montserrat'; font-size: clamp(3rem, 10vw, 6rem); background: linear-gradient(90deg, #fff, var(--c), var(--p), #fff); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 4s linear infinite; opacity: 0; }
        @keyframes shine { to { background-position: 200% center; } }

        /* --- Layout & Glassmorphism --- */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        
        /* প্রফেশনাল আপলোড এরিয়া (প্লাস আইকন ছাড়া) */
        .upload-zone {
            border: 2px dashed rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            cursor: pointer;
            text-align: center;
            padding: 20px;
            border-radius: 15px;
        }
        .upload-zone:hover { border-color: var(--c); background: rgba(0, 245, 255, 0.05); }

        /* Timeline & Player */
        .timeline-container { height: 160px; background: #050505; position: relative; overflow-x: auto; border-top: 1px solid #111; }
        .playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #ff0055; box-shadow: 0 0 10px #ff0055; z-index: 50; pointer-events: none; }
        
        .track { height: 40px; background: rgba(255,255,255,0.02); margin: 8px 0; border-radius: 8px; position: relative; min-width: 5000px; }
        .clip { position: absolute; height: 30px; top: 5px; background: linear-gradient(90deg, var(--c), var(--p)); color: #000; font-size: 10px; font-weight: 900; border-radius: 5px; padding: 0 10px; display: flex; align-items: center; }

        /* Responsive */
        @media (max-width: 768px) {
            .desktop-only { display: none; }
            .mobile-scroll { overflow-y: auto; height: calc(100vh - 160px); }
        }
    </style>
</head>
<body class="flex flex-col">

    <div id="intro-overlay">
        <div class="ring" style="width: 250px; height: 250px;" id="r1"></div>
        <div class="ring" style="width: 350px; height: 350px; border-color: var(--p);" id="r2"></div>
        <h1 class="shakil-name" id="sn">SHAKIL</h1>
        <p id="sw" class="text-[9px] tracking-[12px] text-zinc-500 opacity-0 mt-4 uppercase">AI Master Studio</p>
    </div>

    <div id="app" class="flex-1 flex flex-col opacity-0">
        <header class="h-14 px-6 flex items-center justify-between border-b border-white/5 bg-black/80 backdrop-blur-xl">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-white rounded flex items-center justify-center text-black font-black text-xs">AI</div>
                <h1 class="font-black text-sm uppercase tracking-tighter">AI Master Studio</h1>
            </div>
            <div class="flex gap-4">
                <button onclick="openDub()" class="text-[10px] font-bold text-zinc-500 hover:text-white transition tracking-widest uppercase">Dubbing</button>
                <button onclick="downloadNow()" class="bg-white text-black px-4 py-1.5 rounded-full text-[10px] font-black uppercase">Export</button>
            </div>
        </header>

        <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
            <aside class="w-full md:w-72 glass m-1 p-5 flex flex-col gap-4">
                <div class="upload-zone" onclick="document.getElementById('fin').click()">
                    <i class="fa-solid fa-cloud-arrow-up text-zinc-600 mb-2 text-xl"></i>
                    <p class="text-[10px] font-bold text-zinc-500 uppercase">Drop or Click to Upload</p>
                </div>
                <input type="file" id="fin" class="hidden" multiple onchange="handleFiles(this)">
                
                <div id="asset-list" class="flex-1 overflow-y-auto space-y-2">
                    <p class="text-[9px] text-zinc-700 uppercase tracking-widest text-center mt-4">No Media Assets</p>
                </div>
            </aside>

            <section class="flex-1 p-2 flex flex-col items-center justify-center bg-[#010101]">
                <div class="glass w-full max-w-4xl aspect-video relative flex items-center justify-center overflow-hidden bg-black">
                    <video id="v-player" class="w-full h-full object-contain"></video>
                    
                    <div class="absolute bottom-6 flex gap-8 bg-black/70 px-8 py-3 rounded-full border border-white/10">
                        <button onclick="seek(-10)" class="text-zinc-500"><i class="fa-solid fa-backward"></i></button>
                        <button onclick="toggle()" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center text-xl shadow-lg active:scale-90 transition">
                            <i id="p-ico" class="fa-solid fa-play"></i>
                        </button>
                        <button onclick="seek(10)" class="text-zinc-500"><i class="fa-solid fa-forward"></i></button>
                    </div>
                </div>
            </section>
        </main>

        <div class="timeline-container" id="tl-box" onclick="jump(event)">
            <div id="playhead" class="playhead"></div>
            <div class="px-20 py-4">
                <div id="t1" class="track"></div>
                <div id="t2" class="track"></div>
            </div>
            <div class="absolute bottom-2 left-6 text-[10px] font-mono text-cyan-400" id="timer">00:00:00</div>
        </div>
    </div>

    <div id="dub-modal" class="hidden fixed inset-0 bg-black/98 z-[11000] flex items-center justify-center backdrop-blur-3xl p-6">
        <div class="glass w-full max-w-md p-10">
            <h2 class="text-2xl font-black mb-1 uppercase text-cyan-400">AI Dub Sync</h2>
            <textarea id="dub-txt" class="w-full bg-zinc-900 border border-white/10 p-5 rounded-2xl outline-none focus:border-cyan-500 text-sm mb-6 h-32" placeholder="সংলাপটি লিখুন..."></textarea>
            <div class="flex gap-4">
                <button onclick="closeDub()" class="flex-1 text-xs font-bold text-zinc-600 uppercase">Cancel</button>
                <button onclick="runDub()" id="d-btn" class="flex-[2] bg-white text-black py-4 rounded-full text-[10px] font-black uppercase">Start Sync</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('v-player');
        const playIco = document.getElementById('p-ico');
        const playhead = document.getElementById('playhead');
        const timer = document.getElementById('timer');

        // Intro GSAP
        window.onload = () => {
            const tl = gsap.timeline();
            tl.to("#r1", { duration: 1.5, opacity: 0.5, scale: 2, ease: "power4.out" })
              .to("#r2", { duration: 1.5, opacity: 0.3, scale: 2.5, ease: "power4.out" }, "-=1")
              .to("#sn", { duration: 1.5, opacity: 1, scale: 1, ease: "back.out(1.7)" }, "-=1")
              .to("#sw", { duration: 1, opacity: 1, ease: "power2.out" }, "-=0.5")
              .to("#intro-overlay", { duration: 1.2, y: "-100%", ease: "expo.inOut", delay: 1 })
              .to("#app", { duration: 1, opacity: 1, ease: "power2.out" }, "-=0.5");
        };

        function toggle() {
            if(video.paused) { video.play(); playIco.className = 'fa-solid fa-pause'; }
            else { video.pause(); playIco.className = 'fa-solid fa-play'; }
        }

        async function handleFiles(input) {
            const fd = new FormData();
            for(let f of input.files) fd.append('files', f);
            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            
            if(data.uploaded.length > 0) {
                video.src = data.uploaded[0].url;
                document.getElementById('asset-list').innerHTML = `<div class="p-3 bg-white/5 rounded-xl text-[10px] border border-white/5">${data.uploaded[0].name}</div>`;
                document.getElementById('t1').innerHTML = `<div class="clip w-[1200px]">${data.uploaded[0].name}</div>`;
                video.play(); playIco.className = 'fa-solid fa-pause';
            }
        }

        video.ontimeupdate = () => {
            const t = video.currentTime;
            playhead.style.left = (t * 40 + 80) + "px";
            
            const m = Math.floor(t / 60);
            const s = Math.floor(t % 60);
            const ms = Math.floor((t % 1) * 100);
            timer.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}:${ms.toString().padStart(2,'0')}`;
        };

        function jump(e) {
            const rect = document.getElementById('tl-box').getBoundingClientRect();
            const x = e.clientX - rect.left - 80;
            video.currentTime = x / 40;
        }

        function seek(v) { video.currentTime += v; }

        function downloadNow() {
            if(!video.src) return;
            const a = document.createElement('a');
            a.href = video.src;
            a.download = "master_studio_shakil.mp4";
            a.click();
        }

        function openDub() { document.getElementById('dub-modal').classList.remove('hidden'); }
        function closeDub() { document.getElementById('dub-modal').classList.add('hidden'); }

        async function runDub() {
            const text = document.getElementById('dub-txt').value;
            if(!text) return;
            document.getElementById('d-btn').innerText = "Syncing...";
            const res = await fetch('/api/generate-dub', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text })
            });
            const data = await res.json();
            if(data.status === 'success') {
                new Audio(data.audio_url).play();
                const pos = video.currentTime * 40;
                document.getElementById('t2').innerHTML += `<div class="clip" style="left:${pos}px; background:#fff; color:#000">AI VOICE</div>`;
            }
            document.getElementById('d-btn').innerText = "Start Sync";
            closeDub();
        }
    </script>
</body>
</html>
