<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master | Professional Dubbing Studio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;700;900&display=swap');
        
        :root { --cyan: #00f5ff; --purple: #bd00ff; }
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; height: 100vh; }

        /* --- GSAP Intro --- */
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .cosmic-ring { position: absolute; width: 350px; height: 350px; border-radius: 50%; border: 2px solid var(--cyan); opacity: 0; transform: scale(0); }
        .shakil-name { font-size: 5rem; font-weight: 900; background: linear-gradient(90deg, #fff, var(--cyan), var(--purple), #fff); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 4s linear infinite; opacity: 0; }
        @keyframes shine { to { background-position: 200% center; } }

        /* --- Professional Studio UI --- */
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        
        /* Timeline Professional View */
        .timeline-scroll-area { height: 180px; background: #050505; border-top: 2px solid #111; position: relative; overflow-x: auto; overflow-y: hidden; cursor: crosshair; }
        .playhead-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #ff3344; box-shadow: 0 0 15px #ff3344; z-index: 100; pointer-events: none; }
        
        .track-container { width: 5000px; padding: 10px 0; }
        .track-row { height: 45px; background: rgba(255,255,255,0.02); margin-bottom: 5px; position: relative; border-radius: 5px; }
        .track-label { position: sticky; left: 0; width: 100px; background: #0a0a0a; z-index: 10; font-size: 10px; font-weight: 800; display: flex; align-items: center; padding-left: 10px; border-right: 1px solid #222; }

        .audio-block { position: absolute; height: 35px; top: 5px; background: linear-gradient(90deg, var(--cyan), var(--purple)); color: #000; border-radius: 4px; font-size: 9px; font-weight: 900; display: flex; align-items: center; padding: 0 10px; border-left: 3px solid #fff; }
    </style>
</head>
<body class="flex flex-col">

    <div id="intro-overlay">
        <div class="cosmic-ring" id="r1"></div>
        <div class="cosmic-ring" id="r2" style="border-color: var(--purple);"></div>
        <h1 class="shakil-name" id="s-name">SHAKIL</h1>
        <p id="s-web" class="text-[10px] tracking-[10px] text-zinc-500 opacity-0 uppercase">AI MASTER STUDIO</p>
    </div>

    <div id="app" class="flex-1 flex flex-col opacity-0">
        <header class="h-14 px-6 flex items-center justify-between border-b border-white/5 bg-black/80 backdrop-blur-md">
            <div class="flex items-center gap-3">
                <div class="w-7 h-7 bg-white rounded flex items-center justify-center text-black font-black text-xs">AI</div>
                <h1 class="font-black text-sm uppercase">AI Master</h1>
            </div>
            <div class="flex gap-4">
                <button onclick="openDub()" class="text-[10px] font-bold text-zinc-400 hover:text-cyan-400 uppercase tracking-widest transition">Add Dubbing</button>
                <button onclick="downloadResult()" class="bg-white text-black text-[10px] px-5 py-1.5 rounded-full font-black uppercase hover:bg-cyan-400 transition">Export</button>
            </div>
        </header>

        <main class="flex-1 flex flex-col overflow-hidden">
            <div class="flex-1 flex overflow-hidden">
                <aside class="w-64 glass-card m-2 p-5 flex flex-col gap-4">
                    <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-[3px]">Media Library</h3>
                    <div id="asset-list" class="flex-1 overflow-y-auto space-y-2"></div>
                    <button onclick="document.getElementById('file-upload').click()" class="w-full py-3 border border-dashed border-zinc-700 rounded-xl text-[10px] text-zinc-500 hover:text-white transition">+ Add Files</button>
                    <input type="file" id="file-upload" class="hidden" multiple onchange="uploadMedia(this)">
                </aside>

                <section class="flex-1 p-2 flex items-center justify-center bg-[#020202]">
                    <div class="glass-card w-full max-w-4xl aspect-video relative flex items-center justify-center overflow-hidden">
                        <video id="main-video" class="w-full h-full object-contain"></video>
                        
                        <div class="absolute bottom-6 flex items-center gap-6 bg-black/60 backdrop-blur-xl px-8 py-3 rounded-full border border-white/10">
                            <button onclick="rewind()" class="text-zinc-400"><i class="fa-solid fa-backward"></i></button>
                            <button onclick="togglePlay()" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center shadow-lg transform active:scale-90 transition">
                                <i id="play-icon" class="fa-solid fa-play"></i>
                            </button>
                            <button onclick="forward()" class="text-zinc-400"><i class="fa-solid fa-forward"></i></button>
                        </div>
                    </div>
                </section>
            </div>

            <div class="timeline-scroll-area" id="timeline-container">
                <div id="playhead" class="playhead-line"></div>
                <div class="track-container">
                    <div class="track-row flex" id="v-track"><div class="track-label">Video Track</div></div>
                    <div class="track-row flex" id="a-track"><div class="track-label">Audio Track</div></div>
                    <div class="track-row flex" id="d-track"><div class="track-label">AI Dubbing</div></div>
                </div>
            </div>
            
            <footer class="h-10 bg-black flex items-center px-8 justify-between border-t border-white/5">
                <div id="time-display" class="text-xs font-mono text-cyan-400">00:00:00</div>
                <div class="text-[9px] text-zinc-600 font-bold uppercase tracking-widest">Shakil's Professional Studio</div>
            </footer>
        </main>
    </div>

    <div id="dub-modal" class="hidden fixed inset-0 bg-black/95 z-[11000] flex items-center justify-center backdrop-blur-2xl p-6">
        <div class="glass-card w-full max-w-md p-10">
            <h2 class="text-2xl font-black mb-1 uppercase">AI <span class="text-cyan-400">Dub Sync</span></h2>
            <p class="text-[9px] text-zinc-500 tracking-[5px] uppercase mb-8">Movie Dubbing Engine</p>
            <textarea id="dub-text" class="w-full bg-black border border-white/10 p-5 rounded-2xl outline-none focus:border-cyan-500 text-sm mb-6 h-36" placeholder="সংলাপ এখানে লিখুন..."></textarea>
            <div class="flex gap-4">
                <button onclick="closeDub()" class="flex-1 text-xs font-bold text-zinc-600 uppercase">Cancel</button>
                <button onclick="generateDub()" id="dub-btn" class="flex-[2] bg-white text-black py-4 rounded-full text-[10px] font-black uppercase hover:bg-cyan-400 transition">Sync & Generate</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('main-video');
        const playIcon = document.getElementById('play-icon');
        const playhead = document.getElementById('playhead');
        const timeDisplay = document.getElementById('time-display');
        const timeline = document.getElementById('timeline-container');

        // --- Intro Animation ---
        window.onload = () => {
            const tl = gsap.timeline();
            tl.to("#r1", { duration: 1.5, opacity: 0.5, scale: 2, ease: "power4.out" })
              .to("#r2", { duration: 1.5, opacity: 0.3, scale: 2.5, ease: "power4.out" }, "-=1")
              .to("#s-name", { duration: 1.5, opacity: 1, scale: 1, ease: "back.out(1.7)" }, "-=1")
              .to("#s-web", { duration: 1, opacity: 1, ease: "power2.out" }, "-=0.5")
              .to("#intro-overlay", { duration: 1, y: "-100%", ease: "expo.inOut", delay: 1 })
              .to("#app", { duration: 1, opacity: 1, ease: "power2.out" }, "-=0.5");
        };

        // --- Core Functions ---
        function togglePlay() {
            if(video.paused) { video.play(); playIcon.className = 'fa-solid fa-pause'; }
            else { video.pause(); playIcon.className = 'fa-solid fa-play'; }
        }

        async function uploadMedia(input) {
            const fd = new FormData();
            for(let f of input.files) fd.append('files', f);
            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            
            if(data.uploaded.length > 0) {
                const url = data.uploaded[0].url;
                video.src = url;
                document.getElementById('v-track').innerHTML += `<div class="audio-block w-80" style="left: 0px">${data.uploaded[0].name}</div>`;
                video.play(); playIcon.className = 'fa-solid fa-pause';
            }
        }

        // টাইমলাইন ও প্লেয়ার সিঙ্ক
        video.ontimeupdate = () => {
            const t = video.currentTime;
            const pixelsPerSec = 40;
            const position = t * pixelsPerSec;
            
            // প্লে-হেড মুভমেন্ট
            playhead.style.left = position + "px";
            
            // অটো স্ক্রোল টাইমলাইন
            if(position > timeline.clientWidth / 2) {
                timeline.scrollLeft = position - (timeline.clientWidth / 2);
            }

            // টাইম ডিসপ্লে
            const m = Math.floor(t / 60);
            const s = Math.floor(t % 60);
            const ms = Math.floor((t % 1) * 100);
            timeDisplay.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}:${ms.toString().padStart(2, '0')}`;
        };

        // টাইমলাইনে ক্লিক করলে ভিডিওর সেখানে যাওয়া (Professional Seek)
        timeline.onclick = (e) => {
            const rect = timeline.getBoundingClientRect();
            const x = e.clientX - rect.left + timeline.scrollLeft;
            video.currentTime = x / 40;
        };

        function downloadResult() {
            if(!video.src) return alert("প্রথমে একটি ভিডিও আপলোড করুন");
            const a = document.createElement('a');
            a.href = video.src;
            a.download = "shakil_ai_master_studio.mp4";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function openDub() { document.getElementById('dub-modal').classList.remove('hidden'); }
        function closeDub() { document.getElementById('dub-modal').classList.add('hidden'); }

        async function generateDub() {
            const text = document.getElementById('dub-text').value;
            if(!text) return;
            document.getElementById('dub-btn').innerText = "Syncing...";
            
            const res = await fetch('/api/generate-dub', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text })
            });
            const data = await res.json();
            if(data.status === 'success') {
                const audio = new Audio(data.audio_url);
                audio.play();
                // টাইমলাইনে ব্লক যোগ করা
                const startPos = video.currentTime * 40;
                document.getElementById('d-track').innerHTML += `<div class="audio-block" style="left: ${startPos}px; background: #fff; color: #000">AI SYNC: BENGALI</div>`;
            }
            document.getElementById('dub-btn').innerText = "Sync & Generate";
            closeDub();
        }

        function rewind() { video.currentTime -= 5; }
        function forward() { video.currentTime += 5; }
    </script>
</body>
</html>
