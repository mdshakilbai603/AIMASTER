<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master - CapCut Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .logo-font { font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(24px); }
        .neon { text-shadow: 0 0 15px #00f5ff, 0 0 30px #00f5ff; }
        .asset-card:hover { transform: scale(1.05); }
        .user-icon { width:32px;height:32px;background:linear-gradient(135deg,#334155,#1e2937);border-radius:9999px;display:flex;align-items:center;justify-content:center;color:#67e8f9;font-size:18px; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-hidden flex flex-col">

    <!-- TOP NAV + LEFT ASSETS + MAIN EDITOR + RIGHT PANEL + MOBILE BAR + DUBBING MODAL -->
    <!-- (আগের সব UI একই রাখা হয়েছে, শুধু dubbing অংশ real করা হয়েছে) -->

    <script>
        // loadAssets, importMedia, togglePlay, switchPage ইত্যাদি সব আগের মতোই আছে
        // শুধু generateDubbing আপডেট করা হয়েছে

        async function generateDubbing() {
            const text = document.getElementById('dub-text').value.trim();
            if (!text) return alert("টেক্সট লিখুন");

            const btn = event.target;
            btn.innerHTML = 'Generating...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/generate-dub', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text})
                });
                const data = await res.json();
                if (data.status === 'success') {
                    alert('✅ Bengali Voice তৈরি হয়েছে!');
                    const audio = new Audio(data.audio_url);
                    audio.play();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('সার্ভার সমস্যা');
            }

            btn.innerHTML = 'GENERATE VOICE';
            btn.disabled = false;
            closeDubbingModal();
        }

        // অন্য সব ফাংশন (togglePlay, loadAssets, importMedia ইত্যাদি) আগের মতোই রাখো
        window.onload = () => {
            loadAssets();
            console.log("%cAI Master - Final Free Version Ready", "color:#00f5ff;font-size:16px");
        };
    </script>
</body>
</html>
