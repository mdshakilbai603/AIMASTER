<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Master Pro | Shakil Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@700;900&display=swap');
        
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; margin: 0; height: 100vh; }

        /* --- অরিজিনাল কসমিক এনিমেশন --- */
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .shakil-title {
            font-size: 5rem; font-weight: 900; letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 30%, #00f5ff, #bd00ff, #fff 70%);
            background-size: 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: aurora 5s infinite linear;
        }
        @keyframes aurora { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .cosmic-ring { position: absolute; width: 300px; height: 300px; border-radius: 50%; border: 2px solid #00f5ff; opacity: 0; }

        /* --- CapCut UI --- */
        #main-ui { display: none; flex-direction: column; height: 100vh; }
        header { height: 55px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .res-pill { background: #1a1a1a; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 800; border: 1px solid #333; }
        .export-btn { background: #007aff; color: #fff; padding: 6px 18px; border-radius: 4px; font-size: 11px; font-weight: 900; }

        .preview { flex: 1; background: #000; display: flex; items-center; justify-content: center; position: relative; }
        video { max-width: 100%; max-height: 100%; object-fit: contain; }

        .timeline { height: 280px; background: #0c0c0c; position: relative; border-top: 1px solid #1a1a1a; }
        .playhead { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #fff; z-index: 10; }
        .scroll-tracks { overflow-x: auto; padding-top: 40px; }
        .track { height: 45px; background: rgba(255,255,255,0.03); margin-bottom: 8px; min-width: 5000px; }

        .toolbar { height: 75px; background: #000; display: flex; overflow-x: auto; gap: 20px; padding: 0 15px; align-items: center; border-top: 1px solid #1a1a1a; }
        .tool { display: flex; flex-direction: column; align-items: center; min-width: 55px; color: #777; font-size: 10px; font-weight: bold; }
        .tool.active { color: #fff; }
        .tool i { font-size: 18px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="cosmic-ring" id="ring"></div>
        <h1 class="shakil-title">SHAKIL</h1>
        <p class="text-[10px] tracking-[10px] text-cyan-400 font-bold mt-10 uppercase">AI MASTER PRO</p>
    </div>

    <div id="main-ui">
        <header>
            <i class="fa-solid fa-chevron-left text-lg"></i>
            <div class="res-pill">1080P <i class="fa-solid fa-caret-down text-[8px] ml-1"></i></div>
            <button class="export-btn" onclick="location.reload()">EXPORT</button>
        </header>

        <div class="preview" onclick="document.getElementById('vid-in').click()">
            <video id="player" playsinline></video>
            <input type="file" id="vid-in" class="hidden" onchange="loadMedia(this)">
            <i id="play-ico" class="fa-solid fa-play text-4xl opacity-20 absolute"></i>
        </div>

        <div class="timeline">
            <div class="playhead"></div>
            <div class="scroll-tracks" id="scr-tl">
                <div class="track" id="v-tr"></div>
                <div class="track"></div>
            </div>
        </div>

        <div class="toolbar">
            <div class="tool active"><i class="fa-solid fa-scissors"></i><span>Edit</span></div>
            <div class="tool"><i class="fa-solid fa-microphone-lines text-cyan-400"></i><span>Dubbing</span></div>
            <div class="tool"><i class="fa-solid fa-music"></i><span>Audio</span></div>
            <div class="tool"><i class="fa-solid fa-font"></i><span>Text</span></div>
            <div class="tool"><i class="fa-solid fa-layer-group"></i><span>Overlay</span></div>
            <div class="tool"><i class="fa-solid fa-wand-magic-sparkles"></i><span>Effects</span></div>
            <div class="tool"><i class="fa-solid fa-sliders"></i><span>Adjust</span></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('player');
        
        window.onload = () => {
            const tl = gsap.timeline();
            tl.to("#ring", { duration: 1.5, opacity: 0.5, scale: 2.5, ease: "power4.out" })
              .to("#intro-overlay", { duration: 1.2, y: "-100%", ease: "expo.inOut", delay: 1 })
              .set("#main-ui", { display: "flex" });
        };

        function loadMedia(input) {
            if(!input.files[0]) return;
            video.src = URL.createObjectURL(input.files[0]);
            document.getElementById('v-tr').innerHTML = `<div class="h-full bg-zinc-800 border-x border-white/20 ml-[50%] w-[1000px] flex items-center px-4 text-[9px] font-bold">${input.files[0].name}</div>`;
        }

        video.ontimeupdate = () => {
            document.getElementById('scr-tl').scrollLeft = video.currentTime * 50;
        };
    </script>
</body>
</html>
