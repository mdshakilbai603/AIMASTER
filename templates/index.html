<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHAKIL | AI GEN-3</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@200;900&display=swap');
        
        :root {
            --liquid-color: #ff3c00;
        }

        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Unbounded', sans-serif; 
            overflow: hidden; 
            margin: 0; 
        }

        /* --- LIQUID INTRO ANIMATION --- */
        #intro-canvas {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }

        .fluid-blob {
            position: absolute;
            width: 300px; height: 300px;
            background: linear-gradient(45deg, var(--liquid-color), #5500ff);
            filter: blur(80px);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            opacity: 0.6;
        }

        .brand-logo {
            font-size: clamp(3rem, 15vw, 8rem);
            font-weight: 900;
            letter-spacing: -5px;
            z-index: 10;
            mix-blend-mode: difference;
        }

        /* --- MODERN MINIMAL UI --- */
        .glass-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .main-app { 
            display: flex; flex-direction: column; height: 100vh; padding: 20px; opacity: 0;
        }

        /* Neon Timeline */
        .timeline-box {
            height: 180px;
            background: rgba(0,0,0,0.8);
            border-radius: 40px;
            margin-top: 20px;
            position: relative;
            overflow-x: auto;
            border: 1px solid rgba(255, 60, 0, 0.1);
        }

        .playhead-glow {
            position: absolute; top: 0; bottom: 0; width: 2px;
            background: #fff; z-index: 100;
            box-shadow: 0 0 30px #fff, 0 0 60px var(--liquid-color);
        }

        .track-slot {
            height: 50px; margin: 15px 25px;
            background: rgba(255,255,255,0.02);
            border-radius: 15px; position: relative; min-width: 4000px;
        }

        .clip-gradient {
            position: absolute; height: 40px; top: 5px;
            background: linear-gradient(90deg, #fff, var(--liquid-color));
            border-radius: 10px; color: #000; font-size: 10px; font-weight: 900;
            display: flex; align-items: center; padding: 0 20px;
        }

        .btn-mag {
            background: #fff; color: #000; font-weight: 900;
            padding: 16px 35px; border-radius: 20px;
            font-size: 11px; text-transform: uppercase;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="intro-canvas">
        <div class="fluid-blob" id="blob-1"></div>
        <div class="fluid-blob" id="blob-2"></div>
        <h1 class="brand-logo" id="logo">SHAKIL</h1>
    </div>

    <div class="main-app" id="app-content">
        <header class="h-24 flex items-center justify-between px-6">
            <div class="flex items-center gap-6">
                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center">
                    <div class="w-4 h-4 bg-black rounded-sm rotate-45"></div>
                </div>
                <h2 class="text-[10px] tracking-[10px] uppercase font-light">Gen-3 Engine</h2>
            </div>
            
            <div class="flex gap-4">
                <button onclick="openDub()" class="btn-mag hover:scale-110">AI Dub</button>
                <button onclick="exportVid()" class="glass-container w-14 h-14 flex items-center justify-center">
                    <i class="fa-solid fa-arrow-down-long"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 flex flex-col lg:flex-row gap-6 overflow-hidden">
            <div class="flex-[3] glass-container relative flex items-center justify-center bg-[#050505] overflow-hidden group">
                <video id="v-main" class="max-w-full max-h-full rounded-2xl transition-transform duration-700 group-hover:scale-105" playsinline></video>
                
                <div class="absolute bottom-10 flex gap-10 bg-white/5 backdrop-blur-3xl px-12 py-6 rounded-full border border-white/10">
                    <button onclick="toggle()" class="text-3xl"><i id="p-ico" class="fa-solid fa-play"></i></button>
                </div>
            </div>

            <aside class="flex-1 glass-container p-10 flex flex-col gap-8">
                <div onclick="document.getElementById('file-in').click()" class="aspect-square glass-container border-dashed border-white/10 border-2 flex flex-col items-center justify-center cursor-pointer hover:border-orange-600 transition-colors">
                    <i class="fa-solid fa-plus-large text-4xl mb-4"></i>
                    <span class="text-[10px] font-bold opacity-40">DROP MEDIA</span>
                </div>
                <input type="file" id="file-in" class="hidden" onchange="upload(this)">
                <div id="info" class="text-[9px] opacity-30 text-center tracking-widest">NO SOURCE LOADED</div>
            </aside>
        </main>

        <div class="timeline-box" id="tl" onclick="seek(event)">
            <div id="playhead" class="playhead-glow"></div>
            <div class="py-10">
                <div id="t1" class="track-slot"></div>
                <div id="t2" class="track-slot"></div>
            </div>
            <div id="timer" class="absolute bottom-6 left-10 text-[10px] font-bold opacity-20">00:00:00:00</div>
        </div>
    </div>

    <div id="dub-modal" class="hidden fixed inset-0 bg-black/95 z-[20000] flex items-center justify-center p-6">
        <div class="glass-container w-full max-w-2xl p-16">
            <h3 class="text-4xl font-black mb-10 tracking-tighter">AI VOICE SYNC</h3>
            <textarea id="dub-txt" class="w-full bg-white/5 border border-white/5 p-8 rounded-3xl text-xl h-60 mb-10 focus:border-orange-600 outline-none transition-all" placeholder="সংলাপটি লিখুন..."></textarea>
            <div class="flex gap-6">
                <button onclick="closeDub()" class="text-xs font-bold opacity-30">CANCEL</button>
                <button onclick="runDub()" id="d-btn" class="flex-1 btn-mag">MORPH VOICE</button>
            </div>
        </div>
    </div>

    <script>
        const v = document.getElementById('v-main');
        const pIco = document.getElementById('p-ico');
        const phead = document.getElementById('playhead');

        // --- NEW LIQUID GSAP LOGIC ---
        window.onload = () => {
            // Blob Animation
            gsap.to("#blob-1", { duration: 10, x: 100, y: -50, scale: 1.5, repeat: -1, yoyo: true, ease: "sine.inOut" });
            gsap.to("#blob-2", { duration: 8, x: -100, y: 50, scale: 1.2, repeat: -1, yoyo: true, ease: "sine.inOut" });
            
            const tl = gsap.timeline();
            tl.from("#logo", { duration: 1.5, y: 100, opacity: 0, skewX: 20, ease: "expo.out" })
              .to("#intro-canvas", { duration: 1.5, clipPath: "circle(0% at 50% 50%)", ease: "expo.inOut", delay: 1 })
              .to("#app-content", { duration: 1, opacity: 1, ease: "power2.out" }, "-=0.5");
        };

        function toggle() {
            if(!v.src) return;
            v.paused ? (v.play(), pIco.className='fa-solid fa-pause') : (v.pause(), pIco.className='fa-solid fa-play');
        }

        async function upload(input) {
            const fd = new FormData();
            fd.append('files', input.files[0]);
            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            v.src = data.files[0].url;
            document.getElementById('info').innerText = input.files[0].name.toUpperCase();
            document.getElementById('t1').innerHTML = `<div class="clip-gradient w-[3000px]">${input.files[0].name}</div>`;
            v.play(); pIco.className='fa-solid fa-pause';
        }

        v.ontimeupdate = () => {
            const t = v.currentTime;
            phead.style.left = (t * 60 + 100) + "px";
            document.getElementById('timer').innerText = new Date(t * 1000).toISOString().substr(11, 10);
        };

        function seek(e) {
            const x = e.clientX - document.getElementById('tl').getBoundingClientRect().left + document.getElementById('tl').scrollLeft - 100;
            v.currentTime = x / 60;
        }

        function openDub() { document.getElementById('dub-modal').classList.remove('hidden'); }
        function closeDub() { document.getElementById('dub-modal').classList.add('hidden'); }

        async function runDub() {
            const btn = document.getElementById('d-btn');
            btn.innerText = "MORPHING...";
            const res = await fetch('/api/generate-dub', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text: document.getElementById('dub-txt').value })
            });
            const data = await res.json();
            new Audio(data.audio_url).play();
            document.getElementById('t2').innerHTML += `<div class="clip-gradient" style="left:${v.currentTime*60}px; background:#fff; color:#000">AI MORPH</div>`;
            btn.innerText = "MORPH VOICE";
            closeDub();
        }

        function exportVid() {
            const a = document.createElement('a');
            a.href = v.src; a.download = "Shakil_Gen3.mp4"; a.click();
        }
    </script>
</body>
</html>
